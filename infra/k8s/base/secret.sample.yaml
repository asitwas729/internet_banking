# =============================================================================
# ⚠️ 이 파일은 템플릿. 실제 값을 채운 파일은 절대 커밋하지 말 것.
#
# 운영 권장:
#   - GCP: Secret Manager + Secret Store CSI Driver 로 마운트
#   - 임시: kubectl create secret generic app-secrets --from-env-file=.env.prod -n internet-banking
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: internet-banking
type: Opaque
stringData:
  # DB
  CUSTOMER_DB_PASSWORD: "__CHANGE_ME__"
  DEPOSIT_DB_PASSWORD: "__CHANGE_ME__"
  LOAN_DB_PASSWORD: "__CHANGE_ME__"
  PAYMENT_DB_PASSWORD: "__CHANGE_ME__"
  MASTER_DB_PASSWORD: "__CHANGE_ME__"
  AI_DB_PASSWORD: "__CHANGE_ME__"

  # 인증
  JWT_SECRET: "__CHANGE_ME__min-32-chars__"

  # 외부 API
  OPENAI_API_KEY: ""
  VERTEX_AI_PROJECT_ID: ""
