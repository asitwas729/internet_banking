apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: internet-banking
  labels:
    app: gateway-service
    tier: edge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
        - name: app
          image: ghcr.io/OWNER/gateway-service:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: GATEWAY_APP_PORT
              value: "8080"
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              cpu: 500m
              memory: 640Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
