apiVersion: apps/v1
kind: Deployment
metadata:
  name: consultation-service
  namespace: internet-banking
  labels:
    app: consultation-service
    tier: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consultation-service
  template:
    metadata:
      labels:
        app: consultation-service
    spec:
      containers:
        - name: app
          image: ghcr.io/OWNER/consultation-service:latest
          ports:
            - containerPort: 8087
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 384Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8087
            initialDelaySeconds: 10
            periodSeconds: 10
