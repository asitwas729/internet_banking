groups:
  - name: service-availability
    interval: 30s
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "서비스 다운: {{ $labels.job }}"
          description: "{{ $labels.job }} ({{ $labels.instance }}) 가 1분 이상 응답하지 않습니다."

  - name: http-errors
    interval: 30s
    rules:
      - alert: HighErrorRate5xx
        expr: |
          sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) by (application)
          /
          sum(rate(http_server_requests_seconds_count[5m])) by (application)
          > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "5xx 에러율 급증: {{ $labels.application }}"
          description: "{{ $labels.application }} 의 5xx 에러율이 {{ $value | humanizePercentage }} 입니다."

      - alert: HighErrorRate4xx
        expr: |
          sum(rate(http_server_requests_seconds_count{status=~"4.."}[5m])) by (application)
          /
          sum(rate(http_server_requests_seconds_count[5m])) by (application)
          > 0.20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "4xx 에러율 높음: {{ $labels.application }}"
          description: "{{ $labels.application }} 의 4xx 에러율이 {{ $value | humanizePercentage }} 입니다."

  - name: api-performance
    interval: 30s
    rules:
      - alert: SlowApiResponse
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_server_requests_seconds_bucket[5m])) by (application, le)
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API 응답 지연: {{ $labels.application }}"
          description: "{{ $labels.application }} p95 응답시간이 {{ $value | humanizeDuration }} 입니다."

  - name: jvm
    interval: 30s
    rules:
      - alert: JvmHeapHigh
        expr: |
          sum(jvm_memory_used_bytes{area="heap"}) by (application)
          /
          sum(jvm_memory_max_bytes{area="heap"}) by (application)
          > 0.90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "JVM Heap 사용률 높음: {{ $labels.application }}"
          description: "{{ $labels.application }} Heap 사용률이 {{ $value | humanizePercentage }} 입니다."

  - name: auth-security
    interval: 30s
    rules:
      - alert: BruteForceLoginDetected
        expr: |
          sum(increase(customer_login_failure_total{reason="bad_credentials"}[5m])) > 20
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "로그인 실패 급증 (브루트포스 의심)"
          description: "5분간 로그인 실패가 {{ $value }}회 발생했습니다."

      - alert: HighJwtInvalidRate
        expr: |
          sum(increase(customer_jwt_invalid_total[5m])) > 50
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "JWT 검증 실패 급증"
          description: "5분간 JWT 검증 실패가 {{ $value }}회 발생했습니다."

  - name: database
    interval: 30s
    rules:
      - alert: DbConnectionPoolExhausted
        expr: |
          hikaricp_connections_pending{application=~".+"} > 5
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "DB 커넥션 풀 고갈: {{ $labels.application }}"
          description: "{{ $labels.application }} 대기 중인 커넥션이 {{ $value }}개 입니다."

  - name: kafka-consumer-lag
    interval: 30s
    rules:
      - alert: KafkaConsumerLagHigh
        expr: |
          sum(kafka_consumergroup_lag) by (consumergroup, topic) > 500
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Kafka Consumer Lag 증가: {{ $labels.consumergroup }}"
          description: "{{ $labels.consumergroup }} ({{ $labels.topic }}) lag={{ $value }}"

      - alert: KafkaConsumerLagCritical
        expr: |
          sum(kafka_consumergroup_lag) by (consumergroup, topic) > 2000
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Kafka Consumer Lag 위험: {{ $labels.consumergroup }}"
          description: "{{ $labels.consumergroup }} ({{ $labels.topic }}) lag={{ $value }}"

  - name: kafka-payment
    interval: 30s
    rules:
      - alert: OutboxBacklogHigh
        expr: |
          payment_outbox_pending{application="payment-service"} > 50
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Outbox PENDING 적체"
          description: "Outbox PENDING {{ $value }}건 — 발행 워커 지연 가능성"

      - alert: OutboxBacklogCritical
        expr: |
          payment_outbox_pending{application="payment-service"} > 200
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Outbox PENDING 위험 수준"
          description: "Outbox PENDING {{ $value }}건 — 즉시 확인 필요"

      - alert: KafkaDlqIncrease
        expr: |
          increase(payment_kafka_dlq_total{application="payment-service"}[5m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "DLQ 유입 발생: {{ $labels.cluster }}"
          description: "{{ $labels.cluster }} DLQ에 {{ $value }}건 유입"

      - alert: CompensationRateHigh
        expr: |
          sum(increase(payment_compensation_total{application="payment-service"}[5m])) > 5
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "보상 트랜잭션 급증"
          description: "5분간 보상 트랜잭션 {{ $value }}건 발생"

      - alert: IncompletePaymentHigh
        expr: |
          payment_instruction_incomplete{application="payment-service"} > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "미완료 거래 과다"
          description: "미완료 상태 거래 {{ $value }}건 — 타임아웃 또는 처리 지연 확인 필요"

  - name: ml-loan-review
    interval: 30s
    rules:
      - alert: ReviewResponseTimeSlow
        expr: |
          histogram_quantile(0.95,
            sum(rate(review_duration_seconds_bucket{application="ai-service"}[5m])) by (le)
          ) > 3
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "ML 심사 응답 지연"
          description: "자동심사 p95 응답시간이 {{ $value | humanizeDuration }} — inference-server 상태 확인 필요"

      - alert: ReviewInferenceErrorHigh
        expr: |
          sum(rate(review_inference_error_total{application="ai-service"}[5m]))
          /
          (sum(rate(review_decision_total{application="ai-service"}[5m])) + sum(rate(review_inference_error_total{application="ai-service"}[5m])) + 0.001)
          > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "ML 심사 추론 실패율 급증"
          description: "자동심사 추론 실패율 {{ $value | humanizePercentage }} — inference-server 연결 또는 모델 상태 확인"

      - alert: ReviewRejectRateHigh
        expr: |
          sum(rate(review_decision_total{application="ai-service", decision="REJECT"}[10m]))
          /
          sum(rate(review_decision_total{application="ai-service"}[10m]))
          > 0.70
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "ML 심사 거절율 이상 급증 (데이터 드리프트 의심)"
          description: "10분간 REJECT 비율 {{ $value | humanizePercentage }} — 입력 피처 분포 변화(드리프트) 또는 모델 이상 가능성"

      - alert: ReviewInputMissingHigh
        expr: |
          sum(increase(review_input_missing_total{application="ai-service"}[5m])) > 10
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "ML 심사 입력 결측치 급증"
          description: "5분간 핵심 필드 결측치 {{ $value }}건 — 업스트림 데이터 파이프라인 이상 가능성"

      - alert: ReviewInputOutlierHigh
        expr: |
          sum(increase(review_input_outlier_total{application="ai-service"}[5m])) > 10
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "ML 심사 입력 이상치 급증"
          description: "5분간 핵심 필드 이상치 {{ $value }}건 — 입력 데이터 품질 저하 또는 클라이언트 버그 가능성"

  - name: chatbot
    interval: 30s
    rules:
      - alert: ChatbotActiveSessions
        expr: |
          chatbot_active_sessions > 200
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "챗봇 활성 세션 과다"
          description: "활성 세션 {{ $value }}개 — 세션 정리 또는 스케일아웃 검토 필요"

      - alert: ChatbotHandoffRateHigh
        expr: |
          sum(rate(chatbot_handoff_total[5m]))
          /
          (sum(rate(chatbot_message_total[5m])) + 0.001)
          > 0.30
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "챗봇 상담사 이관율 급증"
          description: "5분간 이관율 {{ $value | humanizePercentage }} — 시나리오 커버리지 또는 LLM 상태 확인 필요"

      - alert: ChatbotLlmErrorHigh
        expr: |
          sum(rate(chatbot_llm_error_total[5m]))
          /
          (sum(rate(chatbot_llm_error_total[5m])) + sum(rate(chatbot_message_total{process_method="BP003_GPT"}[5m])) + 0.001)
          > 0.10
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "챗봇 LLM 오류율 급증"
          description: "LLM 호출 오류율 {{ $value | humanizePercentage }} — OpenAI API 키 또는 네트워크 상태 확인 필요"

      - alert: ChatbotLlmResponseSlow
        expr: |
          histogram_quantile(0.95,
            sum(rate(chatbot_llm_duration_seconds_bucket[5m])) by (le)
          ) > 10
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "챗봇 LLM 응답 지연"
          description: "LLM p95 응답시간 {{ $value | humanizeDuration }} — OpenAI API 응답 저하 가능성"

      - alert: ChatbotKafkaPublishErrorHigh
        expr: |
          sum(rate(chatbot_kafka_publish_total{status="error"}[5m]))
          /
          (sum(rate(chatbot_kafka_publish_total[5m])) + 0.001)
          > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "챗봇 Kafka 발행 오류율 급증"
          description: "Kafka 발행 오류율 {{ $value | humanizePercentage }} — Kafka 브로커 상태 확인 필요"

  - name: monitoring-infrastructure
    interval: 30s
    rules:
      - alert: Watchdog
        expr: vector(1)
        for: 0m
        labels:
          severity: info
          component: monitoring-stack
        annotations:
          summary: "Prometheus heartbeat"
          description: "Prometheus is alive and sending heartbeat to healthchecks.io"

      - alert: PrometheusDown
        expr: up{job="prometheus"} == 0
        for: 1m
        labels:
          severity: critical
          component: monitoring-stack
        annotations:
          summary: "Prometheus 다운"
          description: "메트릭 수집 전체 중단."

      - alert: GrafanaDown
        expr: up{job="grafana"} == 0
        for: 1m
        labels:
          severity: critical
          component: monitoring-stack
        annotations:
          summary: "Grafana 다운"
          description: "대시보드 접근 불가."

      - alert: LokiDown
        expr: up{job="loki"} == 0
        for: 1m
        labels:
          severity: critical
          component: monitoring-stack
        annotations:
          summary: "Loki 다운"
          description: "로그 수집 중단."

      - alert: AlertmanagerDown
        expr: up{job="alertmanager"} == 0
        for: 1m
        labels:
          severity: critical
          component: monitoring-stack
        annotations:
          summary: "Alertmanager 다운"
          description: "Alert가 Slack으로 전송되지 않습니다."

      - alert: LangfuseDown
        expr: probe_success{job="monitoring-stack-probe",instance=~".*langfuse.*"} == 0
        for: 2m
        labels:
          severity: warning
          component: monitoring-stack
        annotations:
          summary: "Langfuse 다운"
          description: "LLM 추적 데이터 유실 가능."

      - alert: LokiNoLogsIngested
        expr: sum(rate(loki_distributor_lines_received_total[5m])) == 0
        for: 5m
        labels:
          severity: warning
          component: monitoring-stack
        annotations:
          summary: "Loki 로그 수집 중단"
          description: "5분간 수집된 로그 없음. Promtail 연결 또는 로그 파일 경로 확인."

      - alert: PrometheusScrapeFailing
        expr: (count(up == 0) / count(up)) > 0.30
        for: 5m
        labels:
          severity: warning
          component: monitoring-stack
        annotations:
          summary: "Prometheus scrape 실패율 30% 초과"
          description: "전체 target 중 {{ $value | humanizePercentage }} 실패 중."

  - name: agent-monitoring
    interval: 30s
    rules:
      - alert: AgentHighFallbackRate
        expr: |
          sum(rate(ai_agent_fallback_total[5m]))
          /
          sum(rate(ai_agent_runs_total[5m]))
          > 0.2
        for: 5m
        labels:
          severity: warning
          component: agent
        annotations:
          summary: "대출 심사 에이전트 폴백률 급증"
          description: "auto-loan-review 에이전트 폴백률이 {{ $value | humanizePercentage }} 입니다. 정상 임계치는 20% 입니다."

      - alert: AgentHardFail
        expr: sum(rate(ai_agent_hard_fail_total[5m])) > 0
        for: 1m
        labels:
          severity: critical
          component: agent
        annotations:
          summary: "대출 심사 에이전트 하드 실패 발생"
          description: "auto-loan-review 에이전트에서 하드 실패가 발생했습니다. 즉각 확인이 필요합니다."

      - alert: AgentHighDisagreementRate
        expr: |
          sum(rate(ai_agent_disagreement_total[5m]))
          /
          sum(rate(ai_agent_runs_total[5m]))
          > 0.3
        for: 5m
        labels:
          severity: warning
          component: agent
        annotations:
          summary: "대출 심사 에이전트 불일치율 급증"
          description: "에이전트와 규칙엔진 판단 불일치율이 {{ $value | humanizePercentage }} 입니다. 에이전트 로직 점검이 필요합니다."

      - alert: ChatbotHighLlmErrorRate
        expr: |
          sum(rate(chatbot_llm_error_total[5m]))
          /
          sum(rate(chatbot_message_total[5m]))
          > 0.1
        for: 5m
        labels:
          severity: warning
          component: agent
        annotations:
          summary: "챗봇 LLM 오류율 급증"
          description: "consultation-service LLM 오류율이 {{ $value | humanizePercentage }} 입니다."

      - alert: ChatbotHighHandoffRate
        expr: |
          sum(rate(chatbot_handoff_total[5m]))
          /
          sum(rate(chatbot_message_total[5m]))
          > 0.5
        for: 5m
        labels:
          severity: warning
          component: agent
        annotations:
          summary: "챗봇 상담사 이관률 급증"
          description: "consultation-service 상담사 이관률이 {{ $value | humanizePercentage }} 입니다. 챗봇이 정상 응답하지 못하는 상황일 수 있습니다."

      - alert: GatewayLoopTimeoutHigh
        expr: sum(rate(aigateway_loop_timeout_total[5m])) > 0
        for: 2m
        labels:
          severity: warning
          component: agent
        annotations:
          summary: "감사 분석 에이전트 턴 초과 폴백 발생"
          description: "review-ai-gateway 에이전트가 최대 턴(5턴)을 초과하여 INSUFFICIENT_DATA를 반환하고 있습니다."
