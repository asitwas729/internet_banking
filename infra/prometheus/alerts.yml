groups:
  - name: service-availability
    interval: 30s
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "서비스 다운: {{ $labels.job }}"
          description: "{{ $labels.job }} ({{ $labels.instance }}) 가 1분 이상 응답하지 않습니다."

  - name: http-errors
    interval: 30s
    rules:
      - alert: HighErrorRate5xx
        expr: |
          sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) by (application)
          /
          sum(rate(http_server_requests_seconds_count[5m])) by (application)
          > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "5xx 에러율 급증: {{ $labels.application }}"
          description: "{{ $labels.application }} 의 5xx 에러율이 {{ $value | humanizePercentage }} 입니다."

      - alert: HighErrorRate4xx
        expr: |
          sum(rate(http_server_requests_seconds_count{status=~"4.."}[5m])) by (application)
          /
          sum(rate(http_server_requests_seconds_count[5m])) by (application)
          > 0.20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "4xx 에러율 높음: {{ $labels.application }}"
          description: "{{ $labels.application }} 의 4xx 에러율이 {{ $value | humanizePercentage }} 입니다."

  - name: api-performance
    interval: 30s
    rules:
      - alert: SlowApiResponse
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_server_requests_seconds_bucket[5m])) by (application, le)
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API 응답 지연: {{ $labels.application }}"
          description: "{{ $labels.application }} p95 응답시간이 {{ $value | humanizeDuration }} 입니다."

  - name: jvm
    interval: 30s
    rules:
      - alert: JvmHeapHigh
        expr: |
          sum(jvm_memory_used_bytes{area="heap"}) by (application)
          /
          sum(jvm_memory_max_bytes{area="heap"}) by (application)
          > 0.90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "JVM Heap 사용률 높음: {{ $labels.application }}"
          description: "{{ $labels.application }} Heap 사용률이 {{ $value | humanizePercentage }} 입니다."

  - name: auth-security
    interval: 30s
    rules:
      - alert: BruteForceLoginDetected
        expr: |
          sum(increase(customer_login_failure_total{reason="bad_credentials"}[5m])) > 20
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "로그인 실패 급증 (브루트포스 의심)"
          description: "5분간 로그인 실패가 {{ $value }}회 발생했습니다."

      - alert: HighJwtInvalidRate
        expr: |
          sum(increase(customer_jwt_invalid_total[5m])) > 50
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "JWT 검증 실패 급증"
          description: "5분간 JWT 검증 실패가 {{ $value }}회 발생했습니다."

  - name: database
    interval: 30s
    rules:
      - alert: DbConnectionPoolExhausted
        expr: |
          hikaricp_connections_pending{application=~".+"} > 5
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "DB 커넥션 풀 고갈: {{ $labels.application }}"
          description: "{{ $labels.application }} 대기 중인 커넥션이 {{ $value }}개 입니다."

  - name: kafka-consumer-lag
    interval: 30s
    rules:
      - alert: KafkaConsumerLagHigh
        expr: |
          sum(kafka_consumergroup_lag) by (consumergroup, topic) > 500
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Kafka Consumer Lag 증가: {{ $labels.consumergroup }}"
          description: "{{ $labels.consumergroup }} ({{ $labels.topic }}) lag={{ $value }}"

      - alert: KafkaConsumerLagCritical
        expr: |
          sum(kafka_consumergroup_lag) by (consumergroup, topic) > 2000
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Kafka Consumer Lag 위험: {{ $labels.consumergroup }}"
          description: "{{ $labels.consumergroup }} ({{ $labels.topic }}) lag={{ $value }}"

  - name: kafka-payment
    interval: 30s
    rules:
      - alert: OutboxBacklogHigh
        expr: |
          payment_outbox_pending{application="payment-service"} > 50
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Outbox PENDING 적체"
          description: "Outbox PENDING {{ $value }}건 — 발행 워커 지연 가능성"

      - alert: OutboxBacklogCritical
        expr: |
          payment_outbox_pending{application="payment-service"} > 200
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Outbox PENDING 위험 수준"
          description: "Outbox PENDING {{ $value }}건 — 즉시 확인 필요"

      - alert: KafkaDlqIncrease
        expr: |
          increase(payment_kafka_dlq_total{application="payment-service"}[5m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "DLQ 유입 발생: {{ $labels.cluster }}"
          description: "{{ $labels.cluster }} DLQ에 {{ $value }}건 유입"

      - alert: CompensationRateHigh
        expr: |
          sum(increase(payment_compensation_total{application="payment-service"}[5m])) > 5
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "보상 트랜잭션 급증"
          description: "5분간 보상 트랜잭션 {{ $value }}건 발생"

      - alert: IncompletePaymentHigh
        expr: |
          payment_instruction_incomplete{application="payment-service"} > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "미완료 거래 과다"
          description: "미완료 상태 거래 {{ $value }}건 — 타임아웃 또는 처리 지연 확인 필요"

  - name: ml-loan-review
    interval: 30s
    rules:
      - alert: ReviewResponseTimeSlow
        expr: |
          histogram_quantile(0.95,
            sum(rate(review_duration_seconds_bucket{application="ai-service"}[5m])) by (le)
          ) > 3
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "ML 심사 응답 지연"
          description: "자동심사 p95 응답시간이 {{ $value | humanizeDuration }} — inference-server 상태 확인 필요"

      - alert: ReviewInferenceErrorHigh
        expr: |
          sum(rate(review_inference_error_total{application="ai-service"}[5m]))
          /
          (sum(rate(review_decision_total{application="ai-service"}[5m])) + sum(rate(review_inference_error_total{application="ai-service"}[5m])) + 0.001)
          > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "ML 심사 추론 실패율 급증"
          description: "자동심사 추론 실패율 {{ $value | humanizePercentage }} — inference-server 연결 또는 모델 상태 확인"

      - alert: ReviewRejectRateHigh
        expr: |
          sum(rate(review_decision_total{application="ai-service", decision="REJECT"}[10m]))
          /
          sum(rate(review_decision_total{application="ai-service"}[10m]))
          > 0.70
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "ML 심사 거절율 이상 급증 (데이터 드리프트 의심)"
          description: "10분간 REJECT 비율 {{ $value | humanizePercentage }} — 입력 피처 분포 변화(드리프트) 또는 모델 이상 가능성"

      - alert: ReviewInputMissingHigh
        expr: |
          sum(increase(review_input_missing_total{application="ai-service"}[5m])) > 10
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "ML 심사 입력 결측치 급증"
          description: "5분간 핵심 필드 결측치 {{ $value }}건 — 업스트림 데이터 파이프라인 이상 가능성"

      - alert: ReviewInputOutlierHigh
        expr: |
          sum(increase(review_input_outlier_total{application="ai-service"}[5m])) > 10
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "ML 심사 입력 이상치 급증"
          description: "5분간 핵심 필드 이상치 {{ $value }}건 — 입력 데이터 품질 저하 또는 클라이언트 버그 가능성"
