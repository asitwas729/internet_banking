global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'customer-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['localhost:8081']

  - job_name: 'deposit-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['localhost:8082']

  - job_name: 'loan-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['localhost:8083']

  - job_name: 'payment-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['localhost:8080']

  - job_name: 'master-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['localhost:8085']

  - job_name: 'ai-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['localhost:8086']

  - job_name: 'windows-exporter'
    static_configs:
      - targets: ['localhost:9182']

  - job_name: 'kafka-exporter-kftc'
    static_configs:
      - targets: ['localhost:9308']
        labels:
          cluster: kftc

  - job_name: 'kafka-exporter-bok'
    static_configs:
      - targets: ['localhost:9309']
        labels:
          cluster: bok

  - job_name: 'kafka-exporter-internal'
    static_configs:
      - targets: ['localhost:9310']
        labels:
          cluster: internal
