global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['host.docker.internal:9090']

  - job_name: 'customer-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8081']

  - job_name: 'deposit-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8082']

  - job_name: 'loan-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8083']

  - job_name: 'payment-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8080']

  - job_name: 'master-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8085']

  - job_name: 'ai-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8086']

  - job_name: 'windows-exporter'
    static_configs:
      - targets: ['host.docker.internal:9182']

  - job_name: 'kafka-exporter-kftc'
    static_configs:
      - targets: ['host.docker.internal:9308']
        labels:
          cluster: kftc

  - job_name: 'kafka-exporter-bok'
    static_configs:
      - targets: ['host.docker.internal:9309']
        labels:
          cluster: bok

  - job_name: 'kafka-exporter-internal'
    static_configs:
      - targets: ['host.docker.internal:9310']
        labels:
          cluster: internal

  - job_name: 'consultation-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:8087']

  - job_name: 'review-ai-gateway'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8088']

  - job_name: 'auto-loan-review'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8089']
