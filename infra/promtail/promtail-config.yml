server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: ${LOKI_DATA_DIR:-C:/loki-data}/positions.yaml

clients:
  - url: http://${LOKI_HOST:-127.0.0.1}:${LOKI_PORT:-3100}/loki/api/v1/push

scrape_configs:
  - job_name: customer-service
    static_configs:
      - targets:
          - localhost
        labels:
          job: customer-service
          application: customer-service
          __path__: ${LOG_DIR:-C:/logs/internet-banking}/customer-service.log
    pipeline_stages:
      - regex:
          expression: '.* \[.*\] (?P<level>INFO|WARN|ERROR|DEBUG) .*'
      - labels:
          level:
