server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: customer-service
    static_configs:
      - targets:
          - localhost
        labels:
          job: customer-service
          application: customer-service
          __path__: /logs/customer-service.log
    pipeline_stages:
      - regex:
          expression: '.* \[.*\] (?P<level>INFO|WARN|ERROR|DEBUG) .*'
      - labels:
          level:

  - job_name: consultation-service
    static_configs:
      - targets:
          - localhost
        labels:
          job: consultation-service
          application: consultation-service
          __path__: /logs/consultation-service.log
    pipeline_stages:
      - regex:
          expression: '(?P<level>INFO|WARNING|ERROR|DEBUG)'
      - labels:
          level:

  - job_name: auto-loan-review
    static_configs:
      - targets:
          - localhost
        labels:
          job: auto-loan-review
          application: auto-loan-review
          __path__: /logs/auto-loan-review.log
    pipeline_stages:
      - regex:
          expression: '.* \[.*\] (?P<level>INFO|WARN|ERROR|DEBUG) .*'
      - labels:
          level:

  - job_name: ai-service
    static_configs:
      - targets:
          - localhost
        labels:
          job: ai-service
          application: ai-service
          __path__: /logs/ai-service.log
    pipeline_stages:
      - regex:
          expression: '.* \[.*\] (?P<level>INFO|WARN|ERROR|DEBUG) .*'
      - labels:
          level:
