server:
  port: ${PAYMENT_APP_PORT:8080}

spring:
  application:
    name: payment-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:}
  datasource:
    url: jdbc:postgresql://${PAYMENT_DB_HOST:localhost}:${PAYMENT_DB_PORT:5435}/${PAYMENT_DB_NAME:payment_db}
    username: ${PAYMENT_DB_USER:payment}
    password: ${PAYMENT_DB_PASSWORD:payment}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration

mybatis:
  mapper-locations: classpath:mappers/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
        payment.instruction.duration: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
    tags:
      application: ${spring.application.name}

# ---- OpenAPI / Swagger UI ----
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: ${SWAGGER_ENABLED:true}
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
  packages-to-scan: com.bank.payment
  default-produces-media-type: application/json

deposit:
  account:
    url: ${DEPOSIT_ACCOUNT_URL:http://localhost:8082}
  balance:
    url: ${DEPOSIT_BALANCE_URL:http://localhost:8082}

payment:
  bank-code: ${BANK_CODE:A}
  timeout:
    kftc-clearing-minutes: ${PAYMENT_TIMEOUT_KFTC_CLEARING_MINUTES:5}
    bok-clearing-seconds: ${PAYMENT_TIMEOUT_BOK_CLEARING_SECONDS:30}
    poll-interval-ms: ${PAYMENT_TIMEOUT_POLL_INTERVAL_MS:10000}
  scheduled:
    poll-interval-ms: ${PAYMENT_SCHEDULED_POLL_INTERVAL_MS:30000}
  settlement:
    kftc-cutoff-cron: ${PAYMENT_SETTLEMENT_KFTC_CUTOFF_CRON:0 0 11 * * *}
  kafka:
    kftc:
      bootstrap-servers: ${KFTC_KAFKA_BOOTSTRAP:localhost:9092}
      consumer-group: ${KFTC_CONSUMER_GROUP:payment-kftc}
    bok:
      bootstrap-servers: ${BOK_KAFKA_BOOTSTRAP:localhost:9093}
      consumer-group: ${BOK_CONSUMER_GROUP:payment-bok}
    internal:
      bootstrap-servers: ${INTERNAL_KAFKA_BOOTSTRAP:localhost:9094}
      consumer-group: ${INTERNAL_CONSUMER_GROUP:payment-internal}
logging:
  file:
    name: ${LOG_DIR:/logs}/payment-service.log
  level:
    root: INFO
