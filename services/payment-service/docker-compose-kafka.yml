# services/payment-service/docker-compose-kafka.yml
#
# 결제계 전용 인프라: Kafka 3 클러스터 + Kafka UI + PostgreSQL A/B + payment-service A/B
# 팀 공용 docker-compose.yml(루트)과 독립 파일 — 결제계 개발 시에만 기동
#
# ★ 기동 방법 (Stage 1 — payment-service 제외):
#   cd services/payment-service
#   cp .env.sample .env
#   docker compose -f docker-compose-kafka.yml up -d \
#     kftc-kafka bok-kafka internal-kafka kafka-ui payment-db-a payment-db-b
#
# ★ payment-service-a/b는 profiles: [app] 으로 격리.
#   Stage 2에서 아래 순서로 기동:
#   1. gradle :services:payment-service:bootJar  (또는 Docker만으로 빌드)
#   2. docker compose -f docker-compose-kafka.yml --profile app build
#   3. docker compose -f docker-compose-kafka.yml --profile app up -d payment-service-a payment-service-b
#
# ⚠ 포트 충돌 주의:
#   루트 docker-compose.yml의 ib-payment-db 기본 포트가 5435이므로
#   두 compose를 동시에 기동하면 payment-db-a(5435)와 충돌합니다.
#   루트 compose의 ib-payment-db는 기동하지 않거나,
#   루트 compose에서 PAYMENT_DB_PORT를 다른 포트로 변경하세요.

name: payment

networks:
  payment-net:
    driver: bridge
  # 팀 공용 네트워크 연결이 필요한 경우 (루트 docker-compose.yml이 먼저 up 된 상태여야 함)
  # ib-network:
  #   external: true
  #   name: internet-banking_default

volumes:
  kftc-kafka-data:
  bok-kafka-data:
  internal-kafka-data:
  payment-db-a-data:
  payment-db-b-data:

services:

  # ===========================================================================
  # Kafka 클러스터 1: KFTC 차액결제망 시뮬레이션 (외부망, A↔B 통신)
  # 호스트 접근: localhost:9092 / 컨테이너 내부: kftc-kafka:29092
  # ★ 학습 환경: 단일 노드 KRaft 모드. 실무: 3노드 클러스터 권장 (replication-factor=3)
  # ===========================================================================
  kftc-kafka:
    image: bitnamilegacy/kafka:3.7
    container_name: payment-kftc-kafka
    ports:
      - "9092:9092"   # PLAINTEXT_HOST — 호스트에서 localhost:9092 접근용
      # 29092 (PLAINTEXT) 는 컨테이너 내부 통신 전용, 호스트 노출 불필요
    environment:
      # KRaft 모드 (Zookeeper 없음)
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kftc-kafka:19092
      # PLAINTEXT_HOST: 호스트 → 컨테이너 접근 (localhost:9092)
      # PLAINTEXT     : 컨테이너 ↔ 컨테이너 통신 (kftc-kafka:29092)
      # CONTROLLER    : KRaft 리더 선출 전용 (내부)
      KAFKA_CFG_LISTENERS: PLAINTEXT_HOST://0.0.0.0:9092,PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:19092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:9092,PLAINTEXT://kftc-kafka:29092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # 운영 정책 (토픽 명시 생성 강제 — P-009 Outbox 패턴과 일관성)
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_CFG_LOG_RETENTION_HOURS: 168   # 7일 기본값; DLQ는 init-topics.sh에서 30일로 재정의
      KAFKA_CFG_NUM_PARTITIONS: 3
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kftc-kafka-data:/bitnami/kafka
    networks:
      - payment-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:29092 --list > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ===========================================================================
  # Kafka 클러스터 2: BOK RTGS 한은망 시뮬레이션 (외부망, A↔B 통신)
  # 호스트 접근: localhost:9093 / 컨테이너 내부: bok-kafka:29093
  # ★ 학습 환경: 단일 노드 KRaft 모드. 실무: 3노드 클러스터 권장
  # ===========================================================================
  bok-kafka:
    image: bitnamilegacy/kafka:3.7
    container_name: payment-bok-kafka
    ports:
      - "9093:9093"   # PLAINTEXT_HOST — 호스트에서 localhost:9093 접근용
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@bok-kafka:19093
      KAFKA_CFG_LISTENERS: PLAINTEXT_HOST://0.0.0.0:9093,PLAINTEXT://0.0.0.0:29093,CONTROLLER://0.0.0.0:19093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:9093,PLAINTEXT://bok-kafka:29093
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_CFG_LOG_RETENTION_HOURS: 168
      KAFKA_CFG_NUM_PARTITIONS: 3
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - bok-kafka-data:/bitnami/kafka
    networks:
      - payment-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:29093 --list > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ===========================================================================
  # Kafka 클러스터 3: 내부 도메인 이벤트 채널 (Choreography)
  # A/B 공유 — 분리 안 함. Consumer가 BANK_CODE 헤더로 필터링 (P-029 동일 원칙)
  # 호스트 접근: localhost:9094 / 컨테이너 내부: internal-kafka:29094
  # ★ 학습 환경: 단일 노드 KRaft 모드. 실무: 3노드 클러스터 권장
  # ===========================================================================
  internal-kafka:
    image: bitnamilegacy/kafka:3.7
    container_name: payment-internal-kafka
    ports:
      - "9094:9094"   # PLAINTEXT_HOST — 호스트에서 localhost:9094 접근용
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@internal-kafka:19094
      KAFKA_CFG_LISTENERS: PLAINTEXT_HOST://0.0.0.0:9094,PLAINTEXT://0.0.0.0:29094,CONTROLLER://0.0.0.0:19094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:9094,PLAINTEXT://internal-kafka:29094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_CFG_LOG_RETENTION_HOURS: 168
      KAFKA_CFG_NUM_PARTITIONS: 3
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - internal-kafka-data:/bitnami/kafka
    networks:
      - payment-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:29094 --list > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ===========================================================================
  # Kafka UI — 3 클러스터 통합 모니터링
  # http://localhost:8090
  # ===========================================================================
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: payment-kafka-ui
    ports:
      - "${KAFKA_UI_PORT:-8090}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: kftc
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kftc-kafka:29092
      KAFKA_CLUSTERS_1_NAME: bok
      KAFKA_CLUSTERS_1_BOOTSTRAPSERVERS: bok-kafka:29093
      KAFKA_CLUSTERS_2_NAME: internal
      KAFKA_CLUSTERS_2_BOOTSTRAPSERVERS: internal-kafka:29094
    networks:
      - payment-net
    depends_on:
      kftc-kafka:
        condition: service_healthy
      bok-kafka:
        condition: service_healthy
      internal-kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ===========================================================================
  # PostgreSQL A은행 결제계 DB
  # ⚠ 포트 5435는 루트 docker-compose.yml의 ib-payment-db 기본 포트(PAYMENT_DB_PORT=5435)와 동일.
  #   동시 기동 시 충돌. 루트 compose의 ib-payment-db를 기동하지 말 것.
  # ===========================================================================
  payment-db-a:
    image: postgres:16-alpine
    container_name: payment-db-a
    ports:
      - "${PAYMENT_DB_A_PORT:-5435}:5432"
    environment:
      POSTGRES_DB: ${PAYMENT_DB_A_NAME:-payment_a}
      POSTGRES_USER: ${PAYMENT_DB_A_USER:-payment}
      POSTGRES_PASSWORD: ${PAYMENT_DB_A_PASSWORD:-payment}
    volumes:
      - payment-db-a-data:/var/lib/postgresql/data
    networks:
      - payment-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PAYMENT_DB_A_USER:-payment} -d ${PAYMENT_DB_A_NAME:-payment_a}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # PostgreSQL B은행 결제계 DB
  # ===========================================================================
  payment-db-b:
    image: postgres:16-alpine
    container_name: payment-db-b
    ports:
      - "${PAYMENT_DB_B_PORT:-5436}:5432"
    environment:
      POSTGRES_DB: ${PAYMENT_DB_B_NAME:-payment_b}
      POSTGRES_USER: ${PAYMENT_DB_B_USER:-payment}
      POSTGRES_PASSWORD: ${PAYMENT_DB_B_PASSWORD:-payment}
    volumes:
      - payment-db-b-data:/var/lib/postgresql/data
    networks:
      - payment-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PAYMENT_DB_B_USER:-payment} -d ${PAYMENT_DB_B_NAME:-payment_b}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # Kafka Exporter — 클러스터별 Consumer Lag / 토픽 지표 수집
  # Prometheus가 Windows 바이너리로 실행되므로 호스트 포트로 노출
  # KFTC: 9308, BOK: 9309, Internal: 9310
  # ===========================================================================
  kafka-exporter-kftc:
    image: danielqsj/kafka-exporter:latest
    container_name: payment-kafka-exporter-kftc
    ports:
      - "${KAFKA_EXPORTER_KFTC_PORT:-9308}:9308"
    command:
      - "--kafka.server=kftc-kafka:29092"
    networks:
      - payment-net
    depends_on:
      kftc-kafka:
        condition: service_healthy
    restart: on-failure

  kafka-exporter-bok:
    image: danielqsj/kafka-exporter:latest
    container_name: payment-kafka-exporter-bok
    ports:
      - "${KAFKA_EXPORTER_BOK_PORT:-9309}:9308"
    command:
      - "--kafka.server=bok-kafka:29093"
    networks:
      - payment-net
    depends_on:
      bok-kafka:
        condition: service_healthy
    restart: on-failure

  kafka-exporter-internal:
    image: danielqsj/kafka-exporter:latest
    container_name: payment-kafka-exporter-internal
    ports:
      - "${KAFKA_EXPORTER_INTERNAL_PORT:-9310}:9308"
    command:
      - "--kafka.server=internal-kafka:29094"
    networks:
      - payment-net
    depends_on:
      internal-kafka:
        condition: service_healthy
    restart: on-failure

  # ===========================================================================
  # A은행 결제계 서비스 (BANK_CODE=A, 포트 8080)
  # ★ Stage 2에서 build.gradle 완성 후 image 빌드 가능.
  #   현재는 컨테이너 정의 placeholder — Dockerfile 미존재로 직접 기동 불가.
  #   profiles: [app] 으로 격리되어 있어 일반 up 명령에서는 기동되지 않음.
  # ===========================================================================
  payment-service-a:
    build:
      context: ../..                                    # 프로젝트 루트 (멀티모듈 Gradle 빌드 컨텍스트)
      dockerfile: services/payment-service/Dockerfile   # 멀티스테이지: gradle:8.9-jdk17 builder
    image: payment-service:local
    container_name: payment-service-a
    ports:
      - "${PAYMENT_SERVICE_A_PORT:-8080}:8080"
    environment:
      BANK_CODE: "A"
      SPRING_PROFILES_ACTIVE: "mock"
      SPRING_DATASOURCE_URL: jdbc:postgresql://payment-db-a:5432/${PAYMENT_DB_A_NAME:-payment_a}
      SPRING_DATASOURCE_USERNAME: ${PAYMENT_DB_A_USER:-payment}
      SPRING_DATASOURCE_PASSWORD: ${PAYMENT_DB_A_PASSWORD:-payment}
      KFTC_KAFKA_BOOTSTRAP: kftc-kafka:29092
      BOK_KAFKA_BOOTSTRAP: bok-kafka:29093
      INTERNAL_KAFKA_BOOTSTRAP: internal-kafka:29094
      PAYMENT_TIMEOUT_KFTC_CLEARING_MINUTES: ${PAYMENT_TIMEOUT_KFTC_CLEARING_MINUTES:-5}
      PAYMENT_TIMEOUT_BOK_CLEARING_SECONDS: ${PAYMENT_TIMEOUT_BOK_CLEARING_SECONDS:-30}
      PAYMENT_TIMEOUT_POLL_INTERVAL_MS: ${PAYMENT_TIMEOUT_POLL_INTERVAL_MS:-10000}
    networks:
      - payment-net
    depends_on:
      payment-db-a:
        condition: service_healthy
      kftc-kafka:
        condition: service_healthy
      bok-kafka:
        condition: service_healthy
      internal-kafka:
        condition: service_healthy
    profiles:
      - app   # docker compose --profile app up 으로만 기동 (Stage 2 이후)
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ===========================================================================
  # B은행 결제계 서비스 (BANK_CODE=B, 포트 8180)
  # ★ Stage 2에서 build.gradle 완성 후 image 빌드 가능. (A와 동일 코드, 다른 환경변수)
  # ===========================================================================
  payment-service-b:
    build:
      context: ../..
      dockerfile: services/payment-service/Dockerfile
    image: payment-service:local
    container_name: payment-service-b
    ports:
      - "${PAYMENT_SERVICE_B_PORT:-8180}:8080"
    environment:
      BANK_CODE: "B"
      SPRING_DATASOURCE_URL: jdbc:postgresql://payment-db-b:5432/${PAYMENT_DB_B_NAME:-payment_b}
      SPRING_DATASOURCE_USERNAME: ${PAYMENT_DB_B_USER:-payment}
      SPRING_DATASOURCE_PASSWORD: ${PAYMENT_DB_B_PASSWORD:-payment}
      KFTC_KAFKA_BOOTSTRAP: kftc-kafka:29092
      BOK_KAFKA_BOOTSTRAP: bok-kafka:29093
      INTERNAL_KAFKA_BOOTSTRAP: internal-kafka:29094
    networks:
      - payment-net
    depends_on:
      payment-db-b:
        condition: service_healthy
      kftc-kafka:
        condition: service_healthy
      bok-kafka:
        condition: service_healthy
      internal-kafka:
        condition: service_healthy
    profiles:
      - app   # docker compose --profile app up 으로만 기동 (Stage 2 이후)
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
