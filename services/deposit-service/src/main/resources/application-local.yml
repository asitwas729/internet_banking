# 로컬 개발 환경 전용 설정 — prod 배포 시 이 파일은 적용되지 않는다.
spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/deposit_db
    username: deposit
    password: deposit

  flyway:
    repair-on-migrate: true
    validate-on-migrate: false
    placeholders:
      # 로컬에서만 데모 계좌·잔액 시드(V14)를 실제로 실행한다.
      seedDemoData: true

logging:
  level:
    com.bank.deposit: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
