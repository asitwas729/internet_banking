spring:
  datasource:
    url: jdbc:postgresql://${DEPOSIT_DB_HOST:localhost}:${DEPOSIT_DB_PORT:5433}/${DEPOSIT_DB_NAME:deposit_db}
    username: ${DEPOSIT_DB_USER:deposit}
    password: ${DEPOSIT_DB_PASSWORD:deposit}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8082
