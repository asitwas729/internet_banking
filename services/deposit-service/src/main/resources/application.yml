아래 내용으로 전체 교체하면 됩니다.

```yaml
server:
  port: ${DEPOSIT_APP_PORT:8082}
  servlet:
    context-path: /api

spring:
  application:
    name: deposit-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: jdbc:postgresql://${DEPOSIT_DB_HOST:localhost}:${DEPOSIT_DB_PORT:5433}/${DEPOSIT_DB_NAME:deposit_db}
    username: ${DEPOSIT_DB_USER:deposit}
    password: ${DEPOSIT_DB_PASSWORD:deposit}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    out-of-order: false   # V3·V4 갭 명시적 차단 — 순서 역전 마이그레이션 방지

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    distribution:
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
    tags:
      application: ${spring.application.name}

# ---- OpenAPI / Swagger UI ----
# 접속: http://localhost:${DEPOSIT_APP_PORT:8082}/api/swagger-ui.html
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: ${SWAGGER_ENABLED:true}
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
  packages-to-scan: com.bank.deposit
  default-produces-media-type: application/json

logging:
  level:
    root: INFO
    org.springframework.web: INFO
```