server:
  port: ${DEPOSIT_APP_PORT:8082}

spring:
  application:
    name: deposit-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: jdbc:postgresql://${DEPOSIT_DB_HOST:localhost}:${DEPOSIT_DB_PORT:5433}/${DEPOSIT_DB_NAME:deposit_db}
    username: ${DEPOSIT_DB_USER:deposit}
    password: ${DEPOSIT_DB_PASSWORD:deposit}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
