server:
  port: ${AI_APP_PORT:8086}

spring:
  application:
    name: ai-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

ai:
  inference:
    base-url: ${AI_INFERENCE_BASE_URL:http://localhost:8090}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

# ---- OpenAPI / Swagger UI ----
# 접속: http://localhost:${AI_APP_PORT:8086}/swagger-ui.html
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: ${SWAGGER_ENABLED:true}
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
  packages-to-scan: com.bank.ai
  default-produces-media-type: application/json
