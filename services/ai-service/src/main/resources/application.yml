server:
  port: ${AI_APP_PORT:8086}

logging:
  file:
    name: ${LOG_DIR:C:/logs/internet-banking}/ai-service.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

langfuse:
  enabled: ${LANGFUSE_ENABLED:false}
  secret-key: ${LANGFUSE_SECRET_KEY:}
  public-key: ${LANGFUSE_PUBLIC_KEY:}
  host: ${LANGFUSE_HOST:http://localhost:3001}

# Phoenix OTel 설정 — JVM 실행 시 아래 시스템 프로퍼티로 활성화
# -javaagent:opentelemetry-javaagent.jar
# -Dotel.exporter.otlp.endpoint=http://localhost:4317
# -Dotel.service.name=ai-service

spring:
  application:
    name: ai-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: jdbc:postgresql://${AI_DB_HOST:localhost}:${AI_DB_PORT:5437}/${AI_DB_NAME:ai_db}
    username: ${AI_DB_USER:ai}
    password: ${AI_DB_PASSWORD:ai}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    distribution:
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
    tags:
      application: ${spring.application.name}

# ---- OpenAPI / Swagger UI ----
# 접속: http://localhost:${AI_APP_PORT:8086}/swagger-ui.html
rag:
  embed:
    provider: ${RAG_EMBED_PROVIDER:mock}
    model: ${RAG_EMBED_MODEL:text-embedding-3-small}
    dimension: ${RAG_EMBED_DIMENSION:1536}
    batch-size: ${RAG_EMBED_BATCH_SIZE:16}
    timeout-ms: ${RAG_EMBED_TIMEOUT_MS:5000}
    openai:
      base-url: ${RAG_OPENAI_BASE_URL:https://api.openai.com}
      api-key: ${OPENAI_API_KEY:}
      connect-timeout-ms: ${RAG_OPENAI_CONNECT_TIMEOUT_MS:2000}
      read-timeout-ms: ${RAG_OPENAI_READ_TIMEOUT_MS:10000}
      max-attempts: ${RAG_OPENAI_MAX_ATTEMPTS:3}
      retry-backoff-ms: ${RAG_OPENAI_RETRY_BACKOFF_MS:300}
  chunk:
    size: ${RAG_CHUNK_SIZE:800}
    overlap: ${RAG_CHUNK_OVERLAP:120}
  corpus:
    base-dir: ${RAG_CORPUS_BASE_DIR:docs/corpus}
  scheduler:
    enabled: ${RAG_SCHEDULER_ENABLED:false}
    cron: ${RAG_SCHEDULER_CRON:0 0 3 * * *}

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: ${SWAGGER_ENABLED:true}
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
  packages-to-scan: com.bank.ai
  default-produces-media-type: application/json
