server:
  port: ${CUSTOMER_APP_PORT:8081}

spring:
  application:
    name: customer-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: jdbc:postgresql://${CUSTOMER_DB_HOST:localhost}:${CUSTOMER_DB_PORT:5432}/${CUSTOMER_DB_NAME:customer_db}
    username: ${CUSTOMER_DB_USER:customer}
    password: ${CUSTOMER_DB_PASSWORD:customer}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
