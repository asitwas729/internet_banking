server:
  port: ${CUSTOMER_APP_PORT:8081}

spring:
  application:
    name: customer-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: jdbc:postgresql://${CUSTOMER_DB_HOST:localhost}:${CUSTOMER_DB_PORT:5432}/${CUSTOMER_DB_NAME:customer_db}
    username: ${CUSTOMER_DB_USER:customer}
    password: ${CUSTOMER_DB_PASSWORD:customer}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:none}
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
        hikaricp.connections.acquire: true
        hikaricp.connections.usage: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
    tags:
      application: ${spring.application.name}

# ---- OpenAPI / Swagger UI ----
# 접속: http://localhost:${CUSTOMER_APP_PORT}/swagger-ui.html
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: ${SWAGGER_ENABLED:true}
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
  packages-to-scan: com.bank.customer
  default-produces-media-type: application/json

jwt:
  secret: ${JWT_SECRET:dev-secret-key-please-change-in-production-min-32-chars-long}
  access-token-validity: 600000   # 10분 (밀리초)
  refresh-token-validity: 3600000 # 1시간 (밀리초)

# 민감정보 암호화·본인확인(CI 파생) 키 — 운영은 반드시 env 로 주입(.env 커밋 금지)
customer:
  crypto:
    rrn-key: ${RRN_CRYPTO_KEY:dev-rrn-crypto-key-change-in-production}   # 주민번호 AES-256 키(패스프레이즈)
  identity:
    ci-secret: ${IDENTITY_CI_SECRET:dev-ci-secret-change-in-production}  # CI 파생 시크릿(목 본인확인)

# 직원 디렉토리는 V11 이후 DB(employee 테이블 + EMPLOYEE party_role)로 관리한다.
# (구 employee-directory yaml 설정 + EmployeeDirectoryProperties 는 제거됨)

logging:
  file:
    name: ${LOG_DIR:C:/logs/internet-banking}/customer-service.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
