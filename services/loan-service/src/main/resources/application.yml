server:
  port: ${LOAN_APP_PORT:8083}

spring:
  application:
    name: loan-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: jdbc:postgresql://${LOAN_DB_HOST:localhost}:${LOAN_DB_PORT:5434}/${LOAN_DB_NAME:loan_db}
    username: ${LOAN_DB_USER:loan}
    password: ${LOAN_DB_PASSWORD:loan}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all          # 브로커 응답 대기 — 메시지 유실 방지
      retries: 3
      properties:
        enable.idempotence: true   # 프로듀서 멱등성 — 중복 발행 방지
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB

# 대출 도메인 전용 설정
loan:
  document:
    storage-dir: ${LOAN_DOCUMENT_STORAGE_DIR:./storage/loan-documents}
  # 외부 신용평가(가심사) 엔진 어댑터 선택
  #   mock — MockCreditScoreEngine (외부 호출 없음, 자체 룰)
  #   http — HttpCreditScoreEngine (외부 신용평가사 HTTP API 호출)
  credit-score:
    engine:
      type: ${CREDIT_SCORE_ENGINE_TYPE:mock}
      http:
        url: ${CREDIT_SCORE_ENGINE_URL:http://localhost:9999}
        api-key: ${CREDIT_SCORE_ENGINE_API_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    distribution:
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
    tags:
      application: ${spring.application.name}

# ---- OpenAPI / Swagger UI ----
# 접속: http://localhost:${LOAN_APP_PORT}/swagger-ui.html
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: ${SWAGGER_ENABLED:true}
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
  packages-to-scan: com.bank.loan
  default-produces-media-type: application/json


# ---- Advisory / AI Gateway ----
advisory:
  consumer:
    # L7 실험: 값 변경 후 재기동만으로 효과 측정 가능
    fetch-min-bytes: 1            # 실험: 10240으로 올리면 처리량↑ 지연↑
    fetch-max-wait-ms: 500
    fetch-max-bytes: 52428800
    max-partition-fetch-bytes: 1048576
    max-poll-records: 500         # 실험: 5000으로 올리면 max.poll.interval.ms 초과 위험
    max-poll-interval-ms: 300000
    session-timeout-ms: 45000
    heartbeat-interval-ms: 15000
    request-timeout-ms: 30000
    default-api-timeout-ms: 60000
    experiment-delay-ms: 0        # 실험: 양수 설정 시 처리 지연 시뮬레이션 (rebalance 유발)
  producer:
    use-skew-aware-partitioner: false  # L4 실험: true로 바꾸고 재기동 → hot-key 분산 효과 비교
    dlq-backoff-interval-ms: 1000
    dlq-max-attempts: 3
  ai-gateway:
    base-url: ${AIGATEWAY_BASE_URL:http://localhost:8088}
    timeout-ms: ${AIGATEWAY_TIMEOUT_MS:35000}
    connect-timeout-ms: ${AIGATEWAY_CONNECT_TIMEOUT_MS:3000}
