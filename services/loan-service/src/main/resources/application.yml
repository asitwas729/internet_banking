server:
  port: ${LOAN_APP_PORT:8083}

spring:
  application:
    name: loan-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: jdbc:postgresql://${LOAN_DB_HOST:localhost}:${LOAN_DB_PORT:5434}/${LOAN_DB_NAME:loan_db}
    username: ${LOAN_DB_USER:loan}
    password: ${LOAN_DB_PASSWORD:loan}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

ai:
  # ---- D3: 유사 케이스 코퍼스 내보내기 ----
  similar-case-export:
    enabled: ${SIMILAR_CASE_EXPORT_ENABLED:false}         # kill switch
    auto-review-url: ${AUTO_REVIEW_URL:http://localhost:8086}
    internal-token: ${AI_INTERNAL_TOKEN:}
    batch-size: 200
    lookback-days: 1
    cron: "0 0 17 * * *"                                  # 02:00 KST = 17:00 UTC

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

# ---- OpenAPI / Swagger UI ----
# 접속: http://localhost:${LOAN_APP_PORT}/swagger-ui.html
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: ${SWAGGER_ENABLED:true}
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
  packages-to-scan: com.bank.loan
  default-produces-media-type: application/json
