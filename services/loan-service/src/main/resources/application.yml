server:
  port: ${LOAN_APP_PORT:8083}

spring:
  application:
    name: loan-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  flyway:
    # advisory 마이그레이션(db/advisory-migration)은 버전대(V20~)가 loan 과 겹쳐
    # AdvisoryFlywayConfig 가 전용 이력 테이블로 별도 실행한다. 여기엔 loan 것만.
    locations: classpath:db/migration
  datasource:
    url: jdbc:postgresql://${LOAN_DB_HOST:localhost}:${LOAN_DB_PORT:5434}/${LOAN_DB_NAME:loan_db}
    username: ${LOAN_DB_USER:loan}
    password: ${LOAN_DB_PASSWORD:loan}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB

  batch:
    job:
      enabled: false        # 부팅 시 자동 실행 방지
    jdbc:
      initialize-schema: never  # Flyway로 관리

# 공통 계좌 DB (common_db) — Phase 1: loan-service 채택. CommonDataSourceConfig 가 바인딩.
common:
  datasource:
    url: jdbc:postgresql://${COMMON_DB_HOST:localhost}:${COMMON_DB_PORT:5438}/${COMMON_DB_NAME:common_db}
    username: ${COMMON_DB_USER:common}
    password: ${COMMON_DB_PASSWORD:common}
    driver-class-name: org.postgresql.Driver

# 대출 도메인 전용 설정
loan:
  batch:
    eod-cron: "${LOAN_EOD_CRON:0 0 1 * * *}"  # 기본 새벽 1시 KST
    eom-cron: "${LOAN_EOM_CRON:0 0 3 1 * *}"  # 기본 매월 1일 03:00 KST
    calendar-seed-cron: "${LOAN_CALENDAR_SEED_CRON:0 0 4 1 12 *}"  # 기본 매년 12월 1일 04:00 KST
  # 외부 신용평가(가심사) 엔진 어댑터 선택
  #   mock — MockCreditScoreEngine (외부 호출 없음, 자체 룰)
  #   http — HttpCreditScoreEngine (외부 신용평가사 HTTP API 호출)
  credit-score:
    engine:
      type: ${CREDIT_SCORE_ENGINE_TYPE:mock}
      http:
        url: ${CREDIT_SCORE_ENGINE_URL:http://localhost:9999}
        api-key: ${CREDIT_SCORE_ENGINE_API_KEY:}
  # IFRS9 ECL 산정 엔진 어댑터
  #   mock — MockEclEngine (외부 없이 단순 PD/LGD 룰)
  #   http — HttpEclEngine (외부 리스크 엔진 — 후속)
  ecl:
    engine:
      type: ${LOAN_ECL_ENGINE_TYPE:mock}

auto-review:
  enabled: ${AUTO_REVIEW_ENABLED:true}
  base-url: ${AUTO_REVIEW_BASE_URL:http://auto-loan-review:8086}
  internal-token: ${AUTO_REVIEW_INTERNAL_TOKEN:local-internal-token}
  connect-timeout-ms: ${AUTO_REVIEW_CONNECT_TIMEOUT_MS:5000}
  read-timeout-ms: ${AUTO_REVIEW_READ_TIMEOUT_MS:30000}

crypto:
  # AES-256 키 (32바이트 Base64). 반드시 CRYPTO_KEY_BASE64 환경변수로 주입해야 함.
  # 기본값 없음: 미주입 시 부팅 실패 (fail-fast). 로컬 개발값은 application-local.yml 참조.
  key-base64: ${CRYPTO_KEY_BASE64}

payment:
  # 수납/집행 시스템 계좌는 common_db.common_account(account_nickname=LOAN_COLLECTION/LOAN_DISBURSEMENT)로 이관.
  # SystemAccountProvider 가 조회한다. 여기엔 payment-service 엔드포인트만.
  url: ${PAYMENT_SERVICE_URL:http://localhost:8080}
  collection:
    bank-code: ${PAYMENT_COLLECTION_BANK_CODE:088}
    account-no: ${PAYMENT_COLLECTION_ACCOUNT_NO:00000000000}
    holder-name: ${PAYMENT_COLLECTION_HOLDER_NAME:한국은행}
  disbursement:
    account-id: ${PAYMENT_DISBURSEMENT_ACCOUNT_ID:BANK_DISBURSE_001}

doc-agent:
  base-url: ${DOC_AGENT_BASE_URL:http://doc-agent:8080}

internal:
  token: ${INTERNAL_SERVICE_TOKEN:local-internal-token}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    distribution:
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
    tags:
      application: ${spring.application.name}

# ---- OpenAPI / Swagger UI ----
# 접속: http://localhost:${LOAN_APP_PORT}/swagger-ui.html
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: ${SWAGGER_ENABLED:true}
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
  packages-to-scan: com.bank.loan
  default-produces-media-type: application/json


# ---- Advisory / AI Gateway ----
advisory:
  service:
    base-url: ${ADVISORY_BASE_URL:http://advisory-service:8085}
    timeout-ms: ${ADVISORY_TIMEOUT_MS:5000}
    connect-timeout-ms: ${ADVISORY_CONNECT_TIMEOUT_MS:3000}
  ai-gateway:
    base-url: ${AIGATEWAY_BASE_URL:http://localhost:8088}
    timeout-ms: ${AIGATEWAY_TIMEOUT_MS:35000}
    connect-timeout-ms: ${AIGATEWAY_CONNECT_TIMEOUT_MS:3000}
  rag:
    embed:
      provider: ${ADVISORY_RAG_EMBED_PROVIDER:stub}
      model: ${ADVISORY_RAG_EMBED_MODEL:text-embedding-3-small}
      dimension: ${ADVISORY_RAG_EMBED_DIMENSION:1536}
      openai:
        base-url: ${ADVISORY_OPENAI_BASE_URL:https://api.openai.com}
        api-key: ${OPENAI_API_KEY:}
        connect-timeout-ms: ${ADVISORY_OPENAI_CONNECT_TIMEOUT_MS:2000}
        read-timeout-ms: ${ADVISORY_OPENAI_READ_TIMEOUT_MS:10000}
        max-attempts: ${ADVISORY_OPENAI_MAX_ATTEMPTS:3}
        retry-backoff-ms: ${ADVISORY_OPENAI_RETRY_BACKOFF_MS:300}

ai-service:
  base-url: ${AI_SERVICE_BASE_URL:http://localhost:8086}
