server:
  port: ${LOAN_APP_PORT:8083}

spring:
  application:
    name: loan-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  flyway:
    locations: classpath:db/migration,classpath:db/advisory-migration
  datasource:
    url: jdbc:postgresql://${LOAN_DB_HOST:localhost}:${LOAN_DB_PORT:5434}/${LOAN_DB_NAME:loan_db}
    username: ${LOAN_DB_USER:loan}
    password: ${LOAN_DB_PASSWORD:loan}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all          # 브로커 응답 대기 — 메시지 유실 방지
      retries: 3
      properties:
        enable.idempotence: true   # 프로듀서 멱등성 — 중복 발행 방지
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB

  batch:
    job:
      enabled: false        # 부팅 시 자동 실행 방지
    jdbc:
      initialize-schema: never  # Flyway로 관리

# 대출 도메인 전용 설정
loan:
  batch:
    eod-cron: "${LOAN_EOD_CRON:0 0 1 * * *}"  # 기본 새벽 1시 KST
    eom-cron: "${LOAN_EOM_CRON:0 0 3 1 * *}"  # 기본 매월 1일 03:00 KST
    calendar-seed-cron: "${LOAN_CALENDAR_SEED_CRON:0 0 4 1 12 *}"  # 기본 매년 12월 1일 04:00 KST
  # 외부 신용평가(가심사) 엔진 어댑터 선택
  #   mock — MockCreditScoreEngine (외부 호출 없음, 자체 룰)
  #   http — HttpCreditScoreEngine (외부 신용평가사 HTTP API 호출)
  credit-score:
    engine:
      type: ${CREDIT_SCORE_ENGINE_TYPE:mock}
      http:
        url: ${CREDIT_SCORE_ENGINE_URL:http://localhost:9999}
        api-key: ${CREDIT_SCORE_ENGINE_API_KEY:}
  # IFRS9 ECL 산정 엔진 어댑터
  #   mock — MockEclEngine (외부 없이 단순 PD/LGD 룰)
  #   http — HttpEclEngine (외부 리스크 엔진 — 후속)
  ecl:
    engine:
      type: ${LOAN_ECL_ENGINE_TYPE:mock}

auto-review:
  enabled: ${AUTO_REVIEW_ENABLED:true}
  base-url: ${AUTO_REVIEW_BASE_URL:http://auto-loan-review:8086}
  internal-token: ${AUTO_REVIEW_INTERNAL_TOKEN:local-internal-token}
  connect-timeout-ms: ${AUTO_REVIEW_CONNECT_TIMEOUT_MS:5000}
  read-timeout-ms: ${AUTO_REVIEW_READ_TIMEOUT_MS:30000}

crypto:
  # AES-256 키 (32바이트 Base64). 운영 환경에서는 반드시 CRYPTO_KEY_BASE64 환경변수로 교체할 것.
  key-base64: ${CRYPTO_KEY_BASE64:bG9hbi1zZXJ2aWNlLWRldi1hZXMta2V5LTMyYnl0ZQ==}

payment:
  url: ${PAYMENT_SERVICE_URL:http://localhost:8080}
  collection:
    bank-code: ${PAYMENT_COLLECTION_BANK_CODE:088}
    account-no: ${PAYMENT_COLLECTION_ACCOUNT_NO:00000000000}
    holder-name: ${PAYMENT_COLLECTION_HOLDER_NAME:한국은행}
  disbursement:
    account-id: ${PAYMENT_DISBURSEMENT_ACCOUNT_ID:BANK_DISBURSE_001}

doc-agent:
  base-url: ${DOC_AGENT_BASE_URL:http://doc-agent:8080}

internal:
  token: ${INTERNAL_SERVICE_TOKEN:local-internal-token}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    distribution:
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
    tags:
      application: ${spring.application.name}

# ---- OpenAPI / Swagger UI ----
# 접속: http://localhost:${LOAN_APP_PORT}/swagger-ui.html
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: ${SWAGGER_ENABLED:true}
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
  packages-to-scan: com.bank.loan
  default-produces-media-type: application/json


# ---- Advisory / AI Gateway ----
advisory:
  service:
    base-url: ${ADVISORY_BASE_URL:http://advisory-service:8085}
    timeout-ms: ${ADVISORY_TIMEOUT_MS:5000}
    connect-timeout-ms: ${ADVISORY_CONNECT_TIMEOUT_MS:3000}
  consumer:
    # L7 실험: 값 변경 후 재기동만으로 효과 측정 가능
    fetch-min-bytes: 1            # 실험: 10240으로 올리면 처리량↑ 지연↑
    fetch-max-wait-ms: 500
    fetch-max-bytes: 52428800
    max-partition-fetch-bytes: 1048576
    max-poll-records: 500         # 실험: 5000으로 올리면 max.poll.interval.ms 초과 위험
    max-poll-interval-ms: 300000
    session-timeout-ms: 45000
    heartbeat-interval-ms: 15000
    request-timeout-ms: 30000
    default-api-timeout-ms: 60000
    experiment-delay-ms: 0        # 실험: 양수 설정 시 처리 지연 시뮬레이션 (rebalance 유발)
  producer:
    use-skew-aware-partitioner: false  # L4 실험: true로 바꾸고 재기동 → hot-key 분산 효과 비교
  kafka:
    use-avro: false                    # L3 실험: true로 바꾸고 재기동 → Avro 직렬화로 전환
    schema-registry-url: ${SCHEMA_REGISTRY_URL:http://localhost:8081}
    dlq-backoff-interval-ms: 1000
    dlq-max-attempts: 3
    # L8 실험: 아래 값 변경 후 재기동으로 전략 비교
    assignment-strategy: org.apache.kafka.clients.consumer.CooperativeStickyAssignor
    # 실험: Range / RoundRobin 비교
    #   org.apache.kafka.clients.consumer.RangeAssignor
    #   org.apache.kafka.clients.consumer.RoundRobinAssignor
    #   org.apache.kafka.clients.consumer.StickyAssignor
    group-instance-id: ${ADVISORY_CONSUMER_INSTANCE_ID:}  # 비어있으면 동적 멤버십
    client-rack: ${ADVISORY_CLIENT_RACK:}                 # 비어있으면 rack awareness 미적용
  ai-gateway:
    base-url: ${AIGATEWAY_BASE_URL:http://localhost:8088}
    timeout-ms: ${AIGATEWAY_TIMEOUT_MS:35000}
    connect-timeout-ms: ${AIGATEWAY_CONNECT_TIMEOUT_MS:3000}

ai-service:
  base-url: ${AI_SERVICE_BASE_URL:http://localhost:8086}

advisory:
  rag:
    embed:
      provider: ${ADVISORY_RAG_EMBED_PROVIDER:stub}
      model: ${ADVISORY_RAG_EMBED_MODEL:text-embedding-3-small}
      dimension: ${ADVISORY_RAG_EMBED_DIMENSION:1536}
      openai:
        base-url: ${ADVISORY_OPENAI_BASE_URL:https://api.openai.com}
        api-key: ${OPENAI_API_KEY:}
        connect-timeout-ms: ${ADVISORY_OPENAI_CONNECT_TIMEOUT_MS:2000}
        read-timeout-ms: ${ADVISORY_OPENAI_READ_TIMEOUT_MS:10000}
        max-attempts: ${ADVISORY_OPENAI_MAX_ATTEMPTS:3}
        retry-backoff-ms: ${ADVISORY_OPENAI_RETRY_BACKOFF_MS:300}
