server:
  port: ${GATEWAY_APP_PORT:8080}

spring:
  application:
    name: gateway-service

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cloud:
    gateway:
      default-filters:
        - name: RequestRateLimiter
          args:
            # 초당 10개 허용, 순간 최대 20개 (버스트)
            redis-rate-limiter.replenishRate: 10
            redis-rate-limiter.burstCapacity: 20
            key-resolver: "#{@ipKeyResolver}"
      routes:
        - id: customer-auth
          uri: http://${CUSTOMER_SERVICE_HOST:localhost}:${CUSTOMER_APP_PORT:8081}
          predicates:
            - Path=/api/v1/auth/**

        - id: customer-service
          uri: http://${CUSTOMER_SERVICE_HOST:localhost}:${CUSTOMER_APP_PORT:8081}
          predicates:
            - Path=/api/v1/customers/**,/api/customers/**

        - id: deposit-service
          uri: http://${DEPOSIT_SERVICE_HOST:localhost}:${DEPOSIT_APP_PORT:8082}
          predicates:
            - Path=/api/deposit/**

        - id: loan-service
          uri: http://${LOAN_SERVICE_HOST:localhost}:${LOAN_APP_PORT:8083}
          predicates:
            - Path=/api/loan/**

        - id: payment-service
          uri: http://${PAYMENT_SERVICE_HOST:localhost}:${PAYMENT_APP_PORT:8084}
          predicates:
            - Path=/api/payment/**

        - id: master-service
          uri: http://${MASTER_SERVICE_HOST:localhost}:${MASTER_APP_PORT:8085}
          predicates:
            - Path=/api/master/**

        - id: ai-service
          uri: http://${AI_SERVICE_HOST:localhost}:${AI_APP_PORT:8086}
          predicates:
            - Path=/api/ai/**

jwt:
  secret: ${JWT_SECRET:internet-banking-jwt-secret-key-must-be-at-least-32-chars!!}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: INFO
