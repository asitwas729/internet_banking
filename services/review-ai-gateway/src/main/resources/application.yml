server:
  port: ${AIGATEWAY_APP_PORT:8088}

spring:
  application:
    name: review-ai-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: review-ai-gateway
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.bank.aigateway.consumer"
        spring.json.use.type.headers: "false"
        spring.json.value.default.type: "com.bank.aigateway.consumer.LoanBiasCheckPayload"

loan-service:
  base-url: ${LOAN_SERVICE_URL:http://loan-service:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    distribution:
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: ${SWAGGER_ENABLED:true}
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
  packages-to-scan: com.bank.aigateway
  default-produces-media-type: application/json

advisory:
  base-url: ${ADVISORY_BASE_URL:http://advisory-service:8080}

ai-service:
  base-url: ${AI_SERVICE_BASE_URL:http://localhost:8086}

prompt:
  bias:
    system-resource: classpath:prompts/bias/system.txt
    user-resource: classpath:prompts/bias/user.txt
  compliance:
    system-resource: classpath:prompts/compliance/system.txt
    user-resource: classpath:prompts/compliance/user.txt

aigateway:
  agent:
    max-turns: 5   # 근거: 정상종료 run turns p95 + run당 토큰예산 역산 중 min (docs/plan/agent-loop-limits-metrics-plan.md)

llm:
  provider: ${LLM_PROVIDER:mock}
  claude:
    base-url: ${CLAUDE_BASE_URL:https://api.anthropic.com}
    api-key: ${CLAUDE_API_KEY:}
    model: ${CLAUDE_MODEL:claude-opus-4-7}
    max-tokens: ${CLAUDE_MAX_TOKENS:2048}
    timeout-ms: ${CLAUDE_TIMEOUT_MS:30000}
    connect-timeout-ms: ${CLAUDE_CONNECT_TIMEOUT_MS:3000}
    max-attempts: ${CLAUDE_MAX_ATTEMPTS:3}
    retry-backoff-ms: ${CLAUDE_RETRY_BACKOFF_MS:500}

logging:
  file:
    name: ${LOG_DIR:/logs}/review-ai-gateway.log
  level:
    root: INFO
