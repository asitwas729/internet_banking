server:
  port: ${GATEWAY_PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:3000"
              - "http://localhost:3001"
              - "https://axfulbank.store"
              - "https://*.vercel.app"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600
      # [증상 정정] 다운스트림(customer/loan/payment/doc-agent/deposit 등)이
      # 각자 자체 CORS 헤더를 붙여 Access-Control-Allow-Origin 이 중복되면
      # 브라우저가 다중값을 거부한다. 중복 헤더를 유일값으로 병합해 차단을 막는다.
      #
      # RETAIN_UNIQUE 는 값이 동일할 때만 안전하게 1개로 합친다. 현재 각 서비스의
      # allowedOrigins 는 게이트웨이와 동일(localhost:3000/3001)하며, deposit 만
      # allowedOriginPatterns("localhost:*") 로 더 넓으나 위 origin 들에 대해선
      # 동일한 구체값을 반영하므로 병합이 안전하다(2026-06 검증).
      #
      # Allow-Origin/Credentials 외에 Allow-Methods/Allow-Headers/Max-Age 도
      # OPTIONS preflight 응답에서 동일하게 중복되므로 함께 병합한다(브라우저는
      # 관대하나 일관성을 위해 정리).
      #
      # TODO(기술부채): 근본 해법은 CORS 를 게이트웨이에서 단독 처리하고 각 서비스의
      # SecurityConfig/CorsConfig 의 CORS 설정을 제거하는 것이다. 서비스가 추가될
      # 때마다 동일한 이중부착 패턴이 반복되므로, 각 도메인 담당과 협의해 후속 정리 권장.
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials Access-Control-Allow-Methods Access-Control-Allow-Headers Access-Control-Max-Age, RETAIN_UNIQUE
      routes:
        # 인증 공개 엔드포인트 (JWT 검증 없음)
        - id: auth-public
          uri: http://${CUSTOMER_SERVICE_HOST:localhost}:${CUSTOMER_SERVICE_PORT:8081}
          predicates:
            - Path=/api/v1/auth/**

        # 휴대폰 본인인증 (가입 단계 — JWT 없이 공개)
        - id: mobile-auth-public
          uri: http://${CUSTOMER_SERVICE_HOST:localhost}:${CUSTOMER_SERVICE_PORT:8081}
          predicates:
            - Path=/api/v1/mobile-auth/**

        # 고객 도메인 (JWT 필요)
        - id: customer
          uri: http://${CUSTOMER_SERVICE_HOST:localhost}:${CUSTOMER_SERVICE_PORT:8081}
          predicates:
            - Path=/api/v1/customers/**

        # 직원용 내부 API (JWT 필요 — customer-service가 X-User-Role로 역할 게이팅)
        # customer 소유 하위경로만 한정 라우팅 → 타 서비스가 미래에 /api/v1/internal/* 를 써도 충돌 없음.
        # (타 서비스의 internal API는 /api/internal/...(v1 없음)·서비스 간 호출이라 본 라우트와 무관)
        - id: customer-internal
          uri: http://${CUSTOMER_SERVICE_HOST:localhost}:${CUSTOMER_SERVICE_PORT:8081}
          predicates:
            - Path=/api/v1/internal/customers/**,/api/v1/internal/party/**,/api/v1/internal/compliance/**,/api/v1/internal/fds/**

        # 예금·수신 도메인 (JWT 필요)
        - id: deposit
          uri: http://${DEPOSIT_SERVICE_HOST:localhost}:${DEPOSIT_SERVICE_PORT:8082}
          predicates:
            - Path=/api/v1/accounts/**,/api/products/**,/api/accounts/**,/api/contracts/**,/api/transactions/**,/api/interests/**,/api/join-targets/**,/api/payment-schedules/**,/api/departments/**

        # 대출 도메인 (JWT 필요)
        - id: loan
          uri: http://${LOAN_SERVICE_HOST:localhost}:${LOAN_SERVICE_PORT:8083}
          predicates:
            - Path=/api/loan-applications/**,/api/loan-products/**,/api/loan-contracts/**,/api/collaterals/**,/api/credit-info-reports/**,/api/credit-score/**,/api/loan-certificates/**,/api/loan-documents/**,/api/loan-reviews/**,/api/loans/**,/api/business-calendar/**,/api/notifications/**,/api/status-history/**,/api/admin/loan-contracts/**,/api/audit/**,/api/break-glass/**

        # 지급·이체 도메인 (JWT 필요)
        - id: payment
          uri: http://${PAYMENT_SERVICE_HOST:localhost}:${PAYMENT_SERVICE_PORT:8084}
          predicates:
            - Path=/api/v1/payments/**

        # 마스터(공통코드) 도메인 (JWT 필요)
        - id: master
          uri: http://${MASTER_SERVICE_HOST:localhost}:${MASTER_SERVICE_PORT:8085}
          predicates:
            - Path=/api/codes/**

jwt:
  secret: ${JWT_SECRET:dev-secret-key-please-change-in-production-min-32-chars-long}
  access-token-validity: 600000    # 10분 (밀리초)
  refresh-token-validity: 3600000  # 1시간 (밀리초)

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
    tags:
      application: ${spring.application.name}

logging:
  file:
    name: ${LOG_DIR:/logs}/api-gateway.log
  level:
    root: INFO
