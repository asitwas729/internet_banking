<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 860" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="1200" height="860" fill="#0f1117"/>

  <!-- ═══════════════════════════════════════════════════════
       LANE BACKGROUNDS
  ══════════════════════════════════════════════════════════ -->

  <!-- Advisory Service lane -->
  <rect x="20" y="50" width="430" height="760" rx="12" fill="#1a1f2e" stroke="#2d3554" stroke-width="1.5"/>
  <text x="235" y="78" text-anchor="middle" fill="#7b8ec8" font-size="13" font-weight="600" letter-spacing="1">advisory-service</text>

  <!-- review-ai-gateway lane -->
  <rect x="470" y="50" width="380" height="760" rx="12" fill="#1a2a1a" stroke="#2d5432" stroke-width="1.5"/>
  <text x="660" y="78" text-anchor="middle" fill="#7bc87b" font-size="13" font-weight="600" letter-spacing="1">review-ai-gateway</text>

  <!-- External lane -->
  <rect x="870" y="50" width="310" height="760" rx="12" fill="#2a1a1a" stroke="#543232" stroke-width="1.5"/>
  <text x="1025" y="78" text-anchor="middle" fill="#c87b7b" font-size="13" font-weight="600" letter-spacing="1">External / Infra</text>

  <!-- ═══════════════════════════════════════════════════════
       ADVISORY SERVICE — LEFT LANE
  ══════════════════════════════════════════════════════════ -->

  <!-- [1] Rule Engine (ML) -->
  <rect x="40" y="100" width="390" height="110" rx="8" fill="#252d45" stroke="#4a5a8a" stroke-width="1.5"/>
  <text x="60" y="125" fill="#a0aed0" font-size="11" font-weight="700" letter-spacing="0.5">① ML 통계 룰 엔진</text>
  <text x="60" y="145" fill="#6a7aaa" font-size="10">BiasApprovalRateDeviationRule  (승인율 -2σ)</text>
  <text x="60" y="160" fill="#6a7aaa" font-size="10">BiasRejectRateDeviationRule    (거절율 +2σ)</text>
  <text x="60" y="175" fill="#6a7aaa" font-size="10">DsrThresholdOverrideRule  ·  LtvThresholdOverrideRule</text>
  <text x="60" y="190" fill="#6a7aaa" font-size="10">PeerDecisionDivergenceRule   (동료 이탈도)</text>

  <!-- [2] Advisory Reports DB -->
  <rect x="40" y="240" width="185" height="70" rx="8" fill="#1e2a3a" stroke="#3a5a7a" stroke-width="1.5"/>
  <text x="133" y="268" text-anchor="middle" fill="#7aadd0" font-size="11" font-weight="700">ReviewAdvisory</text>
  <text x="133" y="283" text-anchor="middle" fill="#7aadd0" font-size="11" font-weight="700">Report / Signal</text>
  <text x="133" y="298" text-anchor="middle" fill="#4a7aaa" font-size="10">WARN · CRITICAL</text>

  <!-- [3] AuditFairnessAgent -->
  <rect x="40" y="340" width="390" height="130" rx="8" fill="#25302a" stroke="#3a6a4a" stroke-width="1.5"/>
  <text x="60" y="365" fill="#7abf7a" font-size="11" font-weight="700" letter-spacing="0.5">② AuditFairnessAgent</text>
  <text x="60" y="385" fill="#5a8a5a" font-size="10">· LoanReview 의견서 로드</text>
  <text x="60" y="400" fill="#5a8a5a" font-size="10">· PiiMaskingUtil.mask() — PII 마스킹</text>
  <text x="60" y="415" fill="#5a8a5a" font-size="10">· BIAS_DETECTION 그룹 분리</text>
  <text x="60" y="430" fill="#5a8a5a" font-size="10">· COMPLIANCE_VERIFICATION 그룹 분리</text>
  <text x="60" y="448" fill="#5a8a5a" font-size="10">· AiGatewayClient.analyze() × 2</text>

  <!-- [4] RAG Layer -->
  <rect x="40" y="500" width="390" height="135" rx="8" fill="#2a2520" stroke="#6a5a3a" stroke-width="1.5"/>
  <text x="60" y="525" fill="#d0b07a" font-size="11" font-weight="700" letter-spacing="0.5">③ RAG 검색 레이어  (Tool 콜백 수신)</text>
  <text x="60" y="545" fill="#8a7a5a" font-size="10">PolicyCitationRetriever</text>
  <text x="250" y="545" fill="#6a5a4a" font-size="10">→ 정책·규정 벡터 검색</text>
  <text x="60" y="562" fill="#8a7a5a" font-size="10">SimilarCaseRetriever</text>
  <text x="250" y="562" fill="#6a5a4a" font-size="10">→ 과거 유사 심사 코사인 유사도</text>
  <text x="60" y="579" fill="#8a7a5a" font-size="10">ReviewerHistoryRetriever</text>
  <text x="250" y="579" fill="#6a5a4a" font-size="10">→ 심사관 결정 이력</text>
  <text x="60" y="596" fill="#8a7a5a" font-size="10">CohortStatsRetriever</text>
  <text x="250" y="596" fill="#6a5a4a" font-size="10">→ 코호트별 통계</text>
  <text x="60" y="618" fill="#6a5a4a" font-size="10">EmbeddingClient → pgvector (cosine &lt;=&gt;)</text>

  <!-- [5] Save Results -->
  <rect x="40" y="665" width="390" height="120" rx="8" fill="#252d45" stroke="#4a5a8a" stroke-width="1.5"/>
  <text x="60" y="690" fill="#a0aed0" font-size="11" font-weight="700" letter-spacing="0.5">④ 결과 저장 · 후처리</text>
  <text x="60" y="710" fill="#6a7aaa" font-size="10">· AiAuditOpinion 저장  (conclusion, confidence, tokens)</text>
  <text x="60" y="726" fill="#6a7aaa" font-size="10">· ReviewerRiskScore UPSERT</text>
  <text x="60" y="742" fill="#8a4a4a" font-size="10">· BIAS_SUSPECTED / VIOLATION_SUSPECTED</text>
  <text x="60" y="758" fill="#8a4a4a" font-size="10">  → QuarantineTriggeredEvent 발행</text>
  <text x="60" y="774" fill="#6a6a4a" font-size="10">· AdvisoryReportPublishedEvent → Kafka Outbox</text>

  <!-- ═══════════════════════════════════════════════════════
       REVIEW-AI-GATEWAY — CENTER LANE
  ══════════════════════════════════════════════════════════ -->

  <!-- AgenticAuditAnalysisService -->
  <rect x="490" y="100" width="340" height="80" rx="8" fill="#1e2e1e" stroke="#3a6a3a" stroke-width="1.5"/>
  <text x="660" y="125" text-anchor="middle" fill="#7abf7a" font-size="11" font-weight="700">AgenticAuditAnalysisService</text>
  <text x="660" y="144" text-anchor="middle" fill="#5a8a5a" font-size="10">SystemPrompt 선택 (BIAS · COMPLIANCE)</text>
  <text x="660" y="160" text-anchor="middle" fill="#5a8a5a" font-size="10">UserMessage 빌드 → AgenticLoop.run()</text>

  <!-- AgenticLoop box -->
  <rect x="490" y="210" width="340" height="460" rx="8" fill="#1a251a" stroke="#2a5a2a" stroke-width="2"/>
  <text x="660" y="235" text-anchor="middle" fill="#5abf5a" font-size="12" font-weight="700">AgenticLoop  (max 5 turns)</text>

  <!-- Turn cycle inside -->
  <rect x="510" y="248" width="300" height="55" rx="6" fill="#152015" stroke="#2a4a2a" stroke-width="1"/>
  <text x="660" y="267" text-anchor="middle" fill="#9ad09a" font-size="10" font-weight="600">Turn N</text>
  <text x="660" y="284" text-anchor="middle" fill="#5a8a5a" font-size="10">ToolAwareLlmClient.completeWithTools()</text>
  <text x="660" y="299" text-anchor="middle" fill="#5a8a5a" font-size="10">messages[ ] + tools[ ] → Claude API</text>

  <!-- Decision diamond (stop_reason) -->
  <polygon points="660,328 710,358 660,388 610,358" fill="#1e2e1e" stroke="#4a8a4a" stroke-width="1.5"/>
  <text x="660" y="355" text-anchor="middle" fill="#7abf7a" font-size="10" font-weight="600">stop_reason</text>
  <text x="660" y="369" text-anchor="middle" fill="#7abf7a" font-size="10" font-weight="600">?</text>

  <!-- end_turn branch label -->
  <text x="724" y="344" fill="#5abf5a" font-size="9">end_turn</text>
  <!-- tool_use branch label -->
  <text x="614" y="414" fill="#d0b07a" font-size="9">tool_use</text>

  <!-- ToolRegistry box -->
  <rect x="510" y="400" width="300" height="75" rx="6" fill="#252515" stroke="#5a5a2a" stroke-width="1"/>
  <text x="660" y="421" text-anchor="middle" fill="#d0d07a" font-size="10" font-weight="600">ToolRegistry → ToolExecutor</text>
  <text x="660" y="438" text-anchor="middle" fill="#8a8a5a" font-size="9">get_policy_citation</text>
  <text x="660" y="452" text-anchor="middle" fill="#8a8a5a" font-size="9">get_similar_cases · get_reviewer_history · get_cohort_stats</text>
  <text x="660" y="466" text-anchor="middle" fill="#6a6a4a" font-size="9">HTTP → advisory-service /api/internal/advisory/*</text>

  <!-- tool_result feed back -->
  <rect x="510" y="490" width="300" height="45" rx="6" fill="#152015" stroke="#2a4a2a" stroke-width="1"/>
  <text x="660" y="511" text-anchor="middle" fill="#7abf7a" font-size="10">tool_result 추가 → messages[ ]</text>
  <text x="660" y="527" text-anchor="middle" fill="#5a8a5a" font-size="9">에러 시: {"error":"tool_execution_failed",...}</text>

  <!-- maxTurns exceeded -->
  <rect x="510" y="550" width="300" height="40" rx="6" fill="#251515" stroke="#5a2a2a" stroke-width="1"/>
  <text x="660" y="568" text-anchor="middle" fill="#c07a7a" font-size="10">maxTurns(5) 초과</text>
  <text x="660" y="583" text-anchor="middle" fill="#8a5a5a" font-size="9">FALLBACK: INSUFFICIENT_DATA JSON</text>

  <!-- AuditResponseParser -->
  <rect x="490" y="610" width="340" height="45" rx="8" fill="#1e2e1e" stroke="#3a6a3a" stroke-width="1.5"/>
  <text x="660" y="630" text-anchor="middle" fill="#7abf7a" font-size="11" font-weight="700">AuditResponseParser</text>
  <text x="660" y="648" text-anchor="middle" fill="#5a8a5a" font-size="10">conclusion · reasoningSummary · confidenceScore</text>

  <!-- GatewayMetrics -->
  <rect x="490" y="670" width="340" height="40" rx="8" fill="#1a1a2e" stroke="#3a3a6a" stroke-width="1.5"/>
  <text x="660" y="690" text-anchor="middle" fill="#7a7abf" font-size="10" font-weight="600">GatewayMetrics (Micrometer)</text>
  <text x="660" y="706" text-anchor="middle" fill="#5a5a8a" font-size="9">analysisTimer · inputTokens · outputTokens</text>

  <!-- ═══════════════════════════════════════════════════════
       EXTERNAL — RIGHT LANE
  ══════════════════════════════════════════════════════════ -->

  <!-- Claude API -->
  <rect x="890" y="100" width="270" height="100" rx="8" fill="#2a1515" stroke="#6a3a3a" stroke-width="1.5"/>
  <text x="1025" y="128" text-anchor="middle" fill="#d07a7a" font-size="12" font-weight="700">Claude API</text>
  <text x="1025" y="148" text-anchor="middle" fill="#8a5a5a" font-size="10">claude-sonnet-4-6</text>
  <text x="1025" y="165" text-anchor="middle" fill="#8a5a5a" font-size="10">Tool Use  /  stop_reason</text>
  <text x="1025" y="182" text-anchor="middle" fill="#7a4a4a" font-size="10">ClaudeAgenticResponse</text>

  <!-- pgvector DB -->
  <rect x="890" y="230" width="270" height="100" rx="8" fill="#15251a" stroke="#3a6a4a" stroke-width="1.5"/>
  <text x="1025" y="258" text-anchor="middle" fill="#7ad0a0" font-size="12" font-weight="700">pgvector (PostgreSQL)</text>
  <text x="1025" y="278" text-anchor="middle" fill="#5a8a6a" font-size="10">ADVISORY_CASE_INDEX</text>
  <text x="1025" y="294" text-anchor="middle" fill="#5a8a6a" font-size="10">POLICY_DOCUMENT / CHUNK</text>
  <text x="1025" y="310" text-anchor="middle" fill="#5a8a6a" font-size="10">cosine &lt;=&gt; operator</text>

  <!-- Embedding Model -->
  <rect x="890" y="360" width="270" height="70" rx="8" fill="#25251a" stroke="#5a5a3a" stroke-width="1.5"/>
  <text x="1025" y="388" text-anchor="middle" fill="#d0d07a" font-size="11" font-weight="700">Embedding Model</text>
  <text x="1025" y="407" text-anchor="middle" fill="#8a8a5a" font-size="10">EmbeddingClient (Stub / Real)</text>
  <text x="1025" y="422" text-anchor="middle" fill="#6a6a4a" font-size="10">text → float[ ] vector</text>

  <!-- DB -->
  <rect x="890" y="460" width="270" height="100" rx="8" fill="#1a1a2a" stroke="#3a3a6a" stroke-width="1.5"/>
  <text x="1025" y="488" text-anchor="middle" fill="#7a7ad0" font-size="12" font-weight="700">RDB (advisory-service)</text>
  <text x="1025" y="508" text-anchor="middle" fill="#5a5a8a" font-size="10">AI_AUDIT_OPINION</text>
  <text x="1025" y="524" text-anchor="middle" fill="#5a5a8a" font-size="10">REVIEWER_RISK_SCORE</text>
  <text x="1025" y="540" text-anchor="middle" fill="#5a5a8a" font-size="10">REVIEW_ADVISORY_REPORT/SIGNAL</text>

  <!-- Kafka -->
  <rect x="890" y="590" width="270" height="80" rx="8" fill="#2a1a15" stroke="#6a4a3a" stroke-width="1.5"/>
  <text x="1025" y="618" text-anchor="middle" fill="#d0a07a" font-size="12" font-weight="700">Kafka (Outbox)</text>
  <text x="1025" y="638" text-anchor="middle" fill="#8a6a5a" font-size="10">advisory.quarantine.triggered</text>
  <text x="1025" y="654" text-anchor="middle" fill="#8a6a5a" font-size="10">advisory.report.published</text>

  <!-- ═══════════════════════════════════════════════════════
       ARROWS
  ══════════════════════════════════════════════════════════ -->

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6a8a6a"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6a7aaa"/>
    </marker>
    <marker id="arr-yellow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#aaa05a"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#aa6a6a"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8a7aaa"/>
    </marker>
  </defs>

  <!-- [1] Rule Engine → Reports DB -->
  <line x1="235" y1="210" x2="235" y2="238" stroke="#4a5a8a" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="245" y="228" fill="#4a5a8a" font-size="9">WARN/CRITICAL 리포트 생성</text>

  <!-- [2] Reports DB → AuditFairnessAgent -->
  <line x1="235" y1="310" x2="235" y2="338" stroke="#4a6a4a" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="245" y="328" fill="#4a6a4a" font-size="9">advrIds 전달</text>

  <!-- [3] AuditFairnessAgent → AgenticAuditAnalysisService (HTTP) -->
  <line x1="430" y1="390" x2="488" y2="140" stroke="#5a8a5a" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr)"/>
  <text x="436" y="270" fill="#5a8a5a" font-size="9" transform="rotate(-70 440 270)">HTTP POST /audit/analyze</text>

  <!-- AgenticAuditAnalysisService → AgenticLoop -->
  <line x1="660" y1="180" x2="660" y2="208" stroke="#4a8a4a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- AgenticLoop → Claude API -->
  <line x1="830" y1="278" x2="888" y2="185" stroke="#aa6a6a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
  <text x="835" y="240" fill="#aa6a6a" font-size="9">completeWithTools()</text>

  <!-- Claude API → AgenticLoop (response) -->
  <line x1="888" y1="155" x2="832" y2="268" stroke="#7a4a4a" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arr-red)"/>
  <text x="845" y="200" fill="#7a4a4a" font-size="9">ClaudeAgenticResponse</text>

  <!-- end_turn arrow right (out of diamond) -->
  <line x1="710" y1="358" x2="830" y2="358" stroke="#4a8a4a" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="830" y1="358" x2="830" y2="628" stroke="#4a8a4a" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="830" y1="628" x2="832" y2="628" stroke="#4a8a4a" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="716" y="348" fill="#5abf5a" font-size="9">✓ 최종 텍스트</text>

  <!-- tool_use arrow down (from diamond to ToolRegistry) -->
  <line x1="660" y1="388" x2="660" y2="398" stroke="#aaa05a" stroke-width="1.5" marker-end="url(#arr-yellow)"/>

  <!-- ToolRegistry → advisory-service RAG (HTTP callback) -->
  <line x1="510" y1="450" x2="432" y2="565" stroke="#aaa05a" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-yellow)"/>
  <text x="432" y="497" fill="#aaa05a" font-size="9" transform="rotate(55 432 490)">HTTP GET /api/internal</text>

  <!-- RAG → pgvector -->
  <line x1="430" y1="565" x2="888" y2="300" stroke="#5a8a6a" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="600" y="420" fill="#5a8a6a" font-size="9">embed → cosine search</text>

  <!-- EmbeddingClient → pgvector -->
  <line x1="1025" y1="430" x2="1025" y2="458" stroke="#8a8a5a" stroke-width="1.5" marker-end="url(#arr-yellow)"/>

  <!-- tool_result → messages loop back arrow -->
  <line x1="660" y1="490" x2="660" y2="548" stroke="#4a8a4a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- loop back from tool_result to Turn -->
  <path d="M 510 512 Q 470 512 470 278 Q 470 248 510 248" fill="none" stroke="#3a6a3a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="447" y="395" fill="#3a6a3a" font-size="9" transform="rotate(-90 460 400)">재호출 (loop)</text>

  <!-- AgenticLoop → AuditResponseParser -->
  <line x1="660" y1="670" x2="660" y2="608" stroke="#4a8a4a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- AuditResponseParser → Save Results (back to advisory-service) -->
  <line x1="490" y1="630" x2="432" y2="700" stroke="#4a5a8a" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-blue)"/>
  <text x="420" y="655" fill="#4a5a8a" font-size="9">AuditAnalysisResponse</text>

  <!-- Save Results → DB -->
  <line x1="430" y1="720" x2="888" y2="520" stroke="#5a5a8a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-purple)"/>
  <text x="620" y="690" fill="#5a5a8a" font-size="9">AiAuditOpinion · RiskScore 저장</text>

  <!-- Quarantine → Kafka -->
  <line x1="430" y1="758" x2="888" y2="635" stroke="#aa6a3a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
  <text x="620" y="740" fill="#aa6a3a" font-size="9">QuarantineTriggeredEvent</text>

  <!-- ═══════════════════════════════════════════════════════
       TITLE + LEGEND
  ══════════════════════════════════════════════════════════ -->

  <text x="600" y="28" text-anchor="middle" fill="#c0c0d0" font-size="16" font-weight="700" letter-spacing="1">
    Agentic 감사 분석 — LLM · ML · RAG 전체 플로우
  </text>

  <!-- Legend -->
  <rect x="490" y="724" width="340" height="72" rx="6" fill="#111318" stroke="#2a2a3a" stroke-width="1"/>
  <text x="510" y="742" fill="#6a7aaa" font-size="9" font-weight="600">LEGEND</text>
  <line x1="510" y1="755" x2="540" y2="755" stroke="#5a8a5a" stroke-width="1.5"/>
  <text x="545" y="758" fill="#7a9a7a" font-size="9">내부 호출 (동기)</text>
  <line x1="510" y1="770" x2="540" y2="770" stroke="#5a8a5a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="545" y="773" fill="#7a9a7a" font-size="9">HTTP / 외부 호출</text>
  <line x1="630" y1="755" x2="660" y2="755" stroke="#aa6a6a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="665" y="758" fill="#c07a7a" font-size="9">Claude API 호출</text>
  <line x1="630" y1="770" x2="660" y2="770" stroke="#3a6a3a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="665" y="773" fill="#5a8a5a" font-size="9">루프 재진입</text>

</svg>
