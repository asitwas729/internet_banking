<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="1400" viewBox="0 0 1280 1400" font-family="'Malgun Gothic','맑은 고딕',sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5b6b7a"/>
    </marker>
    <marker id="arrowAI" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7c4dff"/>
    </marker>
    <style>
      .t    { font-size:14px; fill:#1f2d3a; text-anchor:middle; }
      .st   { font-size:11px; fill:#5b6b7a; text-anchor:middle; }
      .lbl  { font-size:11px; fill:#5b6b7a; text-anchor:middle; }
      .lblA { font-size:11px; fill:#7c4dff; text-anchor:middle; }
      .box  { fill:#eef3f8; stroke:#5b6b7a; stroke-width:1.5; }
      .gate { fill:#fff6e0; stroke:#d9a514; stroke-width:1.5; }
      .term { fill:#d4edda; stroke:#28a745; stroke-width:1.5; }
      .rej  { fill:#f8d7da; stroke:#dc3545; stroke-width:1.5; }
      .ai   { fill:#e8e0ff; stroke:#7c4dff; stroke-width:1.5; }
      .line { stroke:#5b6b7a; stroke-width:1.5; fill:none; marker-end:url(#arrow); }
      .lineA{ stroke:#7c4dff; stroke-width:1.5; fill:none; marker-end:url(#arrowAI); }
      .dashA{ stroke:#7c4dff; stroke-width:1.5; fill:none; marker-end:url(#arrowAI); }
    </style>
  </defs>

  <text x="640" y="40" font-size="22" font-weight="bold" fill="#1f2d3a" text-anchor="middle">대출 심사 프로세스 · AI 프로세서 통합 플로우</text>
  <text x="640" y="64" class="st">파란 박스 = loan-service 심사 단계   |   보라 박스·화살표 = AI 프로세서 / 외부 서비스 연동</text>

  <!-- lane backgrounds -->
  <rect x="40"  y="90" width="580" height="1260" fill="#f7f9fb" stroke="#d6dee6" stroke-width="1" rx="10"/>
  <rect x="660" y="90" width="580" height="1260" fill="#faf8ff" stroke="#e0d6ff" stroke-width="1" rx="10"/>
  <text x="330" y="116" font-size="14" font-weight="bold" fill="#5b6b7a" text-anchor="middle">loan-service (심사 오케스트레이터 · 상태 머신)</text>
  <text x="950" y="116" font-size="14" font-weight="bold" fill="#7c4dff" text-anchor="middle">AI 프로세서 / 외부 서비스</text>

  <!-- ===== loan-service spine ===== -->

  <!-- 고객 업로드 -->
  <rect class="box" x="150" y="140" width="340" height="50" rx="8"/>
  <text class="t" x="320" y="162">고객 — 서류 업로드 (multipart)</text>
  <text class="st" x="320" y="179">LoanDocument = UPLOADED</text>
  <path class="line" d="M320,190 L320,236"/>

  <!-- 서류 게이트 -->
  <rect class="box" x="150" y="238" width="340" height="56" rx="8"/>
  <text class="t" x="320" y="260">서류 검증 게이트</text>
  <text class="st" x="320" y="278">LoanDocumentService · requireDocumentsCleared()</text>
  <path class="line" d="M320,294 L320,334"/>
  <text class="lbl" x="320" y="314">서류 클리어</text>

  <!-- doc-agent -->
  <rect class="ai" x="690" y="210" width="460" height="92" rx="8"/>
  <text class="t" x="920" y="232">doc-agent :8087 — 서류 검증 파이프라인</text>
  <text class="st" x="920" y="251">L1 Ingest→L2 분류→L3 OCR/PII마스킹→L4 추출→L4b 위변조→L5 Verify</text>
  <text class="st" x="920" y="269">forgery_score 라우팅: &lt;0.3 AUTO_PASS · ~0.7 재제출 · ≥0.7 HOLD</text>
  <text class="st" x="920" y="287">→ verify_status (AUTO_PASS / NEEDS_RESUBMIT / HOLD)</text>

  <path class="lineA" d="M490,256 L688,256"/>
  <text class="lblA" x="589" y="248">POST /documents/submit</text>
  <path class="lineA" d="M688,282 L492,282"/>
  <text class="lblA" x="589" y="297">verify_status</text>

  <!-- inference / ollama -->
  <rect class="ai" x="690" y="322" width="220" height="46" rx="8"/>
  <text class="st" x="800" y="340" font-weight="bold" fill="#3d2b8f">inference-server (Python)</text>
  <text class="st" x="800" y="356">OCR · table-ocr · forgery</text>
  <rect class="ai" x="930" y="322" width="220" height="46" rx="8"/>
  <text class="st" x="1040" y="340" font-weight="bold" fill="#3d2b8f">Ollama Qwen2.5:3b</text>
  <text class="st" x="1040" y="356">필드 추출 · LLM · RAG</text>
  <path class="dashA" d="M820,302 L800,320"/>
  <path class="dashA" d="M1020,302 L1040,320"/>

  <!-- 심사 진입 게이트 -->
  <polygon class="gate" points="320,336 500,386 320,436 140,386"/>
  <text class="t" x="320" y="381">심사 진입 게이트</text>
  <text class="st" x="320" y="399">CB · DSR · IDV · LTV · 보증 · 서류</text>

  <!-- 심사 방식 분기 -->
  <path class="line" d="M320,436 L320,470 L230,470 L230,494"/>
  <path class="line" d="M320,436 L320,470 L410,470 L410,494"/>

  <rect class="box" x="150" y="496" width="170" height="66" rx="8"/>
  <text class="t" x="235" y="520">수동 심사</text>
  <text class="st" x="235" y="537">REVIEWER · run()</text>
  <text class="st" x="235" y="553">POST /review</text>

  <rect class="box" x="350" y="496" width="170" height="66" rx="8"/>
  <text class="t" x="435" y="520">자동 심사 (배치)</text>
  <text class="st" x="435" y="537">autoDecide()</text>
  <text class="st" x="435" y="553">→ PENDING_APPROVAL</text>

  <!-- auto-loan-review ML -->
  <rect class="ai" x="690" y="488" width="460" height="82" rx="8"/>
  <text class="t" x="920" y="510">auto-loan-review — ML 자동심사</text>
  <text class="st" x="920" y="528">Rule Engine + 듀얼 ML (decision + PD)</text>
  <text class="st" x="920" y="544">TrackClassifier: TRACK_1 자동승인 · 2 자동거절 · 3 심사역</text>
  <text class="st" x="920" y="560">→ track · pd · rationale (revAiTrackCd/Pd/Rationale)</text>

  <path class="lineA" d="M520,520 L688,520"/>
  <text class="lblA" x="604" y="512">POST /auto-review/evaluate</text>
  <path class="lineA" d="M688,548 L522,548"/>
  <text class="lblA" x="604" y="563">track · pd (fail-soft)</text>

  <!-- LLM async report -->
  <rect class="ai" x="690" y="600" width="460" height="66" rx="8"/>
  <text class="t" x="920" y="622" font-size="13">비동기 LLM 심사 리포트 파이프라인 (@Async)</text>
  <text class="st" x="920" y="640">PurposeAnalysis → ReviewReport(RAG) → PreReviewProcessor</text>
  <text class="st" x="920" y="656">30초 타임아웃 → fallback</text>
  <path class="dashA" d="M920,570 L920,598"/>
  <text class="lblA" x="956" y="588" text-anchor="start">Event</text>

  <!-- 리뷰어 결정 -->
  <rect class="box" x="150" y="640" width="340" height="50" rx="8"/>
  <text class="t" x="320" y="662">리뷰어 결정 완료</text>
  <text class="st" x="320" y="679">REVIEWER_DECIDED</text>

  <path class="line" d="M235,562 L235,638"/>
  <path class="line" d="M435,562 L435,612 L405,612 L405,638"/>
  <text class="lbl" x="455" y="600">confirm()</text>

  <path class="dashA" d="M688,632 L560,632 L560,664 L492,664"/>
  <text class="lblA" x="600" y="624">PATCH /reviews/{id}/report</text>

  <path class="line" d="M320,690 L320,730"/>
  <text class="lbl" x="320" y="712">편향성 검증 ON</text>

  <!-- 편향성 검증 -->
  <rect class="box" x="150" y="732" width="340" height="56" rx="8"/>
  <text class="t" x="320" y="754">편향성 검증</text>
  <text class="st" x="320" y="772">BIAS_REVIEWING · 공정성/규제 게이트(차단형)</text>

  <!-- 편향성 에이전트 -->
  <rect class="ai" x="690" y="724" width="460" height="80" rx="8"/>
  <text class="t" x="920" y="746">편향성 프로세서 (auto-loan-review)</text>
  <text class="st" x="920" y="764">BiasCheckKafkaConsumer → LLM 분석</text>
  <text class="st" x="920" y="780">→ POST /bias-report → ai_review_advice 저장</text>
  <text class="st" x="920" y="796">severity: NONE·LOW·MEDIUM·HIGH·BLOCKED</text>

  <path class="dashA" d="M490,750 L688,750"/>
  <text class="lblA" x="589" y="742">Kafka loan-domain-events</text>
  <path class="dashA" d="M688,782 L492,782"/>
  <text class="lblA" x="589" y="797">severity 갱신</text>

  <!-- BLOCKED override -->
  <rect class="rej" x="60" y="824" width="180" height="60" rx="8"/>
  <text class="t" x="150" y="847" font-size="13">BLOCKED 차단</text>
  <text class="st" x="150" y="864">시니어 bias-override (4-eye)</text>
  <text class="st" x="150" y="879">/ Ops bias-ops-note</text>

  <path class="line" d="M200,788 L165,822"/>
  <text class="lbl" x="150" y="808">BLOCKED</text>
  <path class="line" d="M240,858 L290,876 L290,920"/>

  <!-- main ack path -->
  <path class="line" d="M320,788 L320,920"/>
  <text class="lbl" x="320" y="844">severity</text>
  <text class="lbl" x="320" y="862">NONE~HIGH</text>
  <text class="lbl" x="400" y="858" text-anchor="start">acknowledge-bias</text>

  <!-- 승인자 결재 -->
  <rect class="box" x="150" y="922" width="340" height="56" rx="8"/>
  <text class="t" x="320" y="944">승인자 결재 대기</text>
  <text class="st" x="320" y="962">PENDING_APPROVER · approverId ≠ reviewerId</text>

  <!-- advisory gate -->
  <rect class="ai" x="690" y="912" width="460" height="74" rx="8"/>
  <text class="t" x="920" y="934">advisory-service :8085 — 자문 리포트</text>
  <text class="st" x="920" y="952">review_advisory_report · OPEN→VIEWED→ACKED</text>
  <text class="st" x="920" y="970">CRITICAL 미확인 시 승인 차단 (LOAN_201)</text>
  <path class="lineA" d="M490,948 L688,948"/>
  <text class="lblA" x="589" y="940">GET /advisory/reports (fail-open)</text>

  <path class="line" d="M320,978 L320,1018"/>
  <text class="lbl" x="410" y="1002" text-anchor="start">approver-approve (4-eye)</text>

  <!-- COMPLETED -->
  <rect class="term" x="150" y="1020" width="340" height="50" rx="8"/>
  <text class="t" x="320" y="1042">최종 확정</text>
  <text class="st" x="320" y="1059">COMPLETED</text>

  <!-- decision split -->
  <path class="line" d="M320,1070 L320,1100 L230,1100 L230,1128"/>
  <path class="line" d="M320,1070 L320,1100 L420,1100 L420,1128"/>

  <rect class="term" x="140" y="1130" width="180" height="50" rx="8"/>
  <text class="t" x="230" y="1152">신청 APPROVED</text>
  <text class="st" x="230" y="1169">LoanApprovedEvent 발행</text>

  <rect class="rej" x="340" y="1130" width="160" height="50" rx="8"/>
  <text class="t" x="420" y="1152">신청 REJECTED</text>
  <text class="st" x="420" y="1169">거절 종료</text>

  <!-- 계약 / 실행 -->
  <path class="line" d="M230,1180 L230,1218"/>
  <rect class="term" x="140" y="1220" width="180" height="50" rx="8"/>
  <text class="t" x="230" y="1242">계약 체결</text>
  <text class="st" x="230" y="1259">CONTRACTED</text>

  <path class="line" d="M320,1245 L348,1245"/>
  <rect class="term" x="350" y="1220" width="180" height="50" rx="8"/>
  <text class="t" x="440" y="1242">대출 실행·입금</text>
  <text class="st" x="440" y="1259">LoanExecution</text>

  <!-- 설계 원칙 -->
  <rect x="690" y="1020" width="460" height="130" rx="10" fill="#ffffff" stroke="#d6dee6" stroke-width="1"/>
  <text x="920" y="1044" font-size="13" font-weight="bold" fill="#1f2d3a" text-anchor="middle">AI 연동 설계 원칙</text>
  <text x="712" y="1068" font-size="12" fill="#1f2d3a">● Fail-soft : auto-review·advisory 다운 → 룰/사람 판단 진행</text>
  <text x="712" y="1090" font-size="12" fill="#1f2d3a">● Fail-closed : bias BLOCKED·advisory CRITICAL → 승인 차단</text>
  <text x="712" y="1112" font-size="12" fill="#1f2d3a">● 동기(REST)=즉답 / 비동기(Kafka·@Async)=무거운 LLM</text>
  <text x="712" y="1134" font-size="12" fill="#1f2d3a">● PII 마스킹 후 LLM · Vault 봉투암호화 · append-only 감사</text>

  <!-- 범례 -->
  <text x="700" y="1200" font-size="13" font-weight="bold" fill="#1f2d3a">범례</text>
  <rect class="box"   x="700" y="1214" width="16" height="16" rx="3"/><text x="724" y="1227" font-size="12" fill="#1f2d3a">심사 단계</text>
  <rect class="gate"  x="830" y="1214" width="16" height="16"/>       <text x="854" y="1227" font-size="12" fill="#1f2d3a">진입 게이트</text>
  <rect class="ai"    x="970" y="1214" width="16" height="16" rx="3"/><text x="994" y="1227" font-size="12" fill="#1f2d3a">AI 프로세서/외부</text>
  <rect class="term"  x="700" y="1244" width="16" height="16" rx="3"/><text x="724" y="1257" font-size="12" fill="#1f2d3a">확정·실행</text>
  <rect class="rej"   x="830" y="1244" width="16" height="16" rx="3"/><text x="854" y="1257" font-size="12" fill="#1f2d3a">차단·거절</text>
</svg>
