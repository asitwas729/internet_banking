stages:
  - build
  - deploy

# 빌드 환경 공통 설정
image: openjdk:17-jdk-slim

variables:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"

before_script:
  - chmod +x ./gradlew

# ==================== loan-service 파이프라인 ====================
build:loan-service:
  stage: build
  script:
    - ./gradlew :loan-service:bootJar
  artifacts:
    paths:
      - loan-service/build/libs/*.jar
    expire_in: 1 week
  rules:
    - changes:
        - loan-service

deploy:loan-service:
  stage: deploy
  image: alpine:latest
  before_script:
    - 'which ssh-agent || ( apk add --no-cache openssh-client )'
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add - > /dev/null
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - scp loan-service/build/libs/*.jar $SERVER_USER@$SERVER_HOST:/home/ubuntu/apps/loan-service/
    - ssh $SERVER_USER@$SERVER_HOST "fuser -k 8080/tcp || true; nohup java -jar /home/ubuntu/apps/loan-service/*.jar > app.log 2>&1 &"
  dependencies:
    - build:loan-service
  rules:
    - changes:
        - loan-service/**/*

# ==================== auto-loan-review 파이프라인 ====================
build:auto-loan-review:
  stage: build
  script:
    - ./gradlew :auto-loan-review:bootJar
  artifacts:
    paths:
      - auto-loan-review/build/libs/*.jar
    expire_in: 1 week
  rules:
    - changes:
        - auto-loan-review/**/*
        - core/**/*

deploy:auto-loan-review:
  stage: deploy
  # ... (loan-service와 동일하되 경로 및 포트만 변경) ...
  dependencies:
    - build:auto-loan-review
  rules:
    - changes:
        - auto-loan-review/**/*
        - core/**/*