name: Deploy to Server

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262 # v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd ~/internet_banking

            # pull 전 커밋 해시 저장
            PREV=$(git rev-parse HEAD)

            git pull origin main

            # 변경된 파일 목록
            CHANGED=$(git diff $PREV HEAD --name-only)
            echo "Changed files:"
            echo "$CHANGED"

            # 공유 모듈·빌드 설정 변경 시 전체 재빌드
            ALL_SERVICES="gateway-service customer-service deposit-service loan-service payment-service payment-service-b master-service auto-loan-review review-ai-gateway consultation-service web"

            if echo "$CHANGED" | grep -qE "^(common|libs)/|^build\.gradle|^settings\.gradle|^docker-compose\.server\.yml"; then
              echo "Shared module or build config changed — rebuilding all services"
              services="$ALL_SERVICES"
            else
              # 변경된 서비스 감지
              services=""
              echo "$CHANGED" | grep -q "^services/api-gateway/"          && services="$services gateway-service"
              echo "$CHANGED" | grep -q "^services/customer-service/"     && services="$services customer-service"
              echo "$CHANGED" | grep -q "^services/deposit-service/"      && services="$services deposit-service"
              echo "$CHANGED" | grep -q "^services/loan-service/"         && services="$services loan-service"
              echo "$CHANGED" | grep -q "^services/payment-service/"      && services="$services payment-service payment-service-b"
              echo "$CHANGED" | grep -q "^services/master-service/"       && services="$services master-service"
              echo "$CHANGED" | grep -q "^services/auto-loan-review/"     && services="$services auto-loan-review"
              echo "$CHANGED" | grep -q "^services/review-ai-gateway/"    && services="$services review-ai-gateway"
              echo "$CHANGED" | grep -q "^services/consultation-service/" && services="$services consultation-service"
              echo "$CHANGED" | grep -q "^web/"                           && services="$services web"
            fi

            if [ -n "$services" ]; then
              echo "Rebuilding: $services"
              docker compose -f docker-compose.server.yml up -d --build $services

              # 헬스체크 — 재빌드한 서비스만 확인
              sleep 30
              FAILED=0
              for svc in $services; do
                if docker compose -f docker-compose.server.yml ps $svc | grep -qE "Exit|unhealthy"; then
                  echo "ERROR: $svc is unhealthy"
                  FAILED=1
                fi
              done
              if [ $FAILED -eq 1 ]; then
                docker compose -f docker-compose.server.yml ps
                exit 1
              fi
              echo "Deploy complete. All deployed services healthy."
              docker compose -f docker-compose.server.yml ps
            else
              echo "No app services changed, skipping rebuild"
            fi
