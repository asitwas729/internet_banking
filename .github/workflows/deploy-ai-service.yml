name: Deploy ai-service

on:
  push:
    branches: [main]
    paths:
      - 'services/ai-service/**'
      - 'common/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.github/workflows/deploy-ai-service.yml'
      - '.github/workflows/reusable-*.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/ai-service/**'
      - 'common/**'
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/reusable-java-build.yml
    with:
      service-name: ai-service

  publish:
    if: github.event_name != 'pull_request'
    needs: test
    uses: ./.github/workflows/reusable-docker-publish.yml
    with:
      service-name: ai-service

  deploy:
    if: github.event_name != 'pull_request'
    needs: publish
    uses: ./.github/workflows/reusable-deploy-oracle.yml
    with:
      service-name: ai-service
      image-tag: ${{ needs.publish.outputs.image-tag }}
    secrets: inherit
