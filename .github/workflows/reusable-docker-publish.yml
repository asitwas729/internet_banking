# =============================================================================
# Reusable Workflow — Docker 이미지 빌드 + GHCR push
#
# Java/Python 공통. service-name 디렉토리의 Dockerfile 을 빌드하고
# ghcr.io/<owner>/<service-name>:<sha> 와 :latest 태그로 push.
#
# 빌드 컨텍스트는 레포 루트 (Java multi-stage Dockerfile 이 root 기준 COPY).
# =============================================================================
name: Reusable Docker Publish

on:
  workflow_call:
    inputs:
      service-name:
        description: '서비스 이름 (이미지명 + Dockerfile 경로에 사용)'
        required: true
        type: string
      dockerfile-path:
        description: 'Dockerfile 경로 (기본: services/<service-name>/Dockerfile)'
        required: false
        type: string
        default: ''
      build-context:
        description: 'Docker build context (기본: 레포 루트)'
        required: false
        type: string
        default: '.'
    outputs:
      image-tag:
        description: 'push 된 이미지 SHA 태그'
        value: ${{ jobs.publish.outputs.image-tag }}

jobs:
  publish:
    name: Build & push ${{ inputs.service-name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve metadata
        id: meta
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          SHA="${GITHUB_SHA::7}"
          IMAGE="ghcr.io/${OWNER}/${{ inputs.service-name }}"
          DOCKERFILE="${{ inputs.dockerfile-path }}"
          if [ -z "$DOCKERFILE" ]; then
            DOCKERFILE="services/${{ inputs.service-name }}/Dockerfile"
          fi
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tag=${SHA}" >> "$GITHUB_OUTPUT"
          echo "dockerfile=${DOCKERFILE}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.build-context }}
          file: ${{ steps.meta.outputs.dockerfile }}
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha,scope=${{ inputs.service-name }}
          cache-to: type=gha,mode=max,scope=${{ inputs.service-name }}
