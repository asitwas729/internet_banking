name: Deploy api-gateway

# api-gateway 는 prod 주 진입점(8080). 이미지 빌드·push 후 Oracle 에 배포한다.
# (컷오버 완료 — 레거시 gateway-service 제거. 배포 시 --remove-orphans 로 잔존 컨테이너 정리.)
on:
  push:
    branches: [main]
    paths:
      - 'services/api-gateway/**'
      - 'common/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.github/workflows/deploy-api-gateway.yml'
      - '.github/workflows/reusable-*.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/api-gateway/**'
      - 'common/**'
  workflow_dispatch:

jobs:
  test:
    permissions:
      contents: read
    uses: ./.github/workflows/reusable-java-build.yml
    with:
      service-name: api-gateway

  publish:
    if: github.event_name != 'pull_request'
    needs: test
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/reusable-docker-publish.yml
    with:
      service-name: api-gateway

  deploy:
    if: github.event_name != 'pull_request'
    needs: publish
    permissions: {}
    uses: ./.github/workflows/reusable-deploy-oracle.yml
    with:
      service-name: api-gateway
      image-tag: ${{ needs.publish.outputs.image-tag }}
      remove-orphans: true   # 레거시 gateway-service 잔존 컨테이너 정리(컷오버 — 8080 포트 충돌 방지)
    secrets: inherit
