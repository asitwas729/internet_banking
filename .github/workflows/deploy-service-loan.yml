name: Deploy Service Loan

on:
  push:
    branches: [ "loan" ]
    paths:
      - 'loan-service'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle' 

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    # 특정 서비스 모듈만 빌드 (BootJar 생성)
    - name: Build Service A with Gradle
      run: ./gradlew :service-a:bootJar

    # 빌드된 JAR 파일을 운영 서버로 전송 및 실행 (예: SCP & SSH)
    # 실제 환경에 맞게 docker build & push 등으로 대체 가능합니다.
    - name: Deploy to Server via SSH
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_KEY }}
        source: "service-a/build/libs/*.jar"
        target: "/home/ubuntu/apps/service-a"
        strip_components: 3 # 폴더 구조를 제외하고 파일만 전송

    - name: Execute Remote SSH commands
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_KEY }}
        script: |
          cd /home/ubuntu/apps/service-a
          fuser -k 8080/tcp || true # 기존 실행 중인 포트 종료
          nohup java -jar *.jar > app.log 2>&1 &