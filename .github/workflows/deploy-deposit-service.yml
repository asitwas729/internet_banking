name: Deploy deposit-service

on:
  push:
    branches: [main]
    paths:
      - 'services/deposit-service/**'
      - 'common/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.github/workflows/deploy-deposit-service.yml'
      - '.github/workflows/reusable-*.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/deposit-service/**'
      - 'common/**'
  workflow_dispatch:

jobs:
  test:
    permissions:
      contents: read
    uses: ./.github/workflows/reusable-java-build.yml
    with:
      service-name: deposit-service

  publish:
    if: github.event_name != 'pull_request'
    needs: test
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/reusable-docker-publish.yml
    with:
      service-name: deposit-service

  deploy:
    if: github.event_name != 'pull_request'
    needs: publish
    permissions: {}
    uses: ./.github/workflows/reusable-deploy-oracle.yml
    with:
      service-name: deposit-service
      image-tag: ${{ needs.publish.outputs.image-tag }}
    secrets: inherit
