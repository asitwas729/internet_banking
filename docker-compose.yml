name: internet-banking

services:

  # =============================================================
  # Database
  # =============================================================

  customer-db:
    image: postgres:16-alpine
    container_name: ib-customer-db
    environment:
      POSTGRES_DB: ${CUSTOMER_DB_NAME:-customer_db}
      POSTGRES_USER: ${CUSTOMER_DB_USER:-customer}
      POSTGRES_PASSWORD: ${CUSTOMER_DB_PASSWORD:-customer}
    ports:
      - "${CUSTOMER_DB_PORT:-5432}:5432"
    volumes:
      - customer-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CUSTOMER_DB_USER:-customer} -d ${CUSTOMER_DB_NAME:-customer_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  deposit-db:
    image: postgres:16-alpine
    container_name: ib-deposit-db
    environment:
      POSTGRES_DB: ${DEPOSIT_DB_NAME:-deposit_db}
      POSTGRES_USER: ${DEPOSIT_DB_USER:-deposit}
      POSTGRES_PASSWORD: ${DEPOSIT_DB_PASSWORD:-deposit}
    ports:
      - "${DEPOSIT_DB_PORT:-5433}:5432"
    volumes:
      - deposit-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DEPOSIT_DB_USER:-deposit} -d ${DEPOSIT_DB_NAME:-deposit_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  loan-db:
    image: pgvector/pgvector:pg16
    container_name: ib-loan-db
    environment:
      POSTGRES_DB: ${LOAN_DB_NAME:-loan_db}
      POSTGRES_USER: ${LOAN_DB_USER:-loan}
      POSTGRES_PASSWORD: ${LOAN_DB_PASSWORD:-loan}
    ports:
      - "${LOAN_DB_PORT:-5434}:5432"
    volumes:
      - loan-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LOAN_DB_USER:-loan} -d ${LOAN_DB_NAME:-loan_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  common-db:
    image: postgres:16-alpine
    container_name: ib-common-db
    environment:
      POSTGRES_DB: ${COMMON_DB_NAME:-common_db}
      POSTGRES_USER: ${COMMON_DB_USER:-common}
      POSTGRES_PASSWORD: ${COMMON_DB_PASSWORD:-common}
    ports:
      - "${COMMON_DB_PORT:-5438}:5432"
    volumes:
      - common-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${COMMON_DB_USER:-common} -d ${COMMON_DB_NAME:-common_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  payment-db:
    image: postgres:16-alpine
    container_name: ib-payment-db
    environment:
      POSTGRES_DB: ${PAYMENT_DB_NAME:-payment_db}
      POSTGRES_USER: ${PAYMENT_DB_USER:-payment}
      POSTGRES_PASSWORD: ${PAYMENT_DB_PASSWORD:-payment}
    ports:
      - "${PAYMENT_DB_PORT:-5435}:5432"
    volumes:
      - payment-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PAYMENT_DB_USER:-payment} -d ${PAYMENT_DB_NAME:-payment_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  payment-db-b:
    image: postgres:16-alpine
    container_name: ib-payment-db-b
    environment:
      POSTGRES_DB: payment_b
      POSTGRES_USER: payment
      POSTGRES_PASSWORD: payment
    ports:
      # doc-agent-db가 5440을 쓰므로(start.ps1 DOC_AGENT_DB_PORT) 충돌 회피용 5441
      - "${PAYMENT_DB_B_PORT:-5441}:5432"
    volumes:
      - payment-db-b-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment -d payment_b"]
      interval: 10s
      timeout: 5s
      retries: 5

  master-db:
    image: postgres:16-alpine
    container_name: ib-master-db
    environment:
      POSTGRES_DB: ${MASTER_DB_NAME:-master_db}
      POSTGRES_USER: ${MASTER_DB_USER:-master}
      POSTGRES_PASSWORD: ${MASTER_DB_PASSWORD:-master}
    ports:
      - "${MASTER_DB_PORT:-5436}:5432"
    volumes:
      - master-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MASTER_DB_USER:-master} -d ${MASTER_DB_NAME:-master_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-db:
    image: pgvector/pgvector:pg16
    container_name: ib-ai-db
    environment:
      POSTGRES_DB: ${AI_DB_NAME:-ai_db}
      POSTGRES_USER: ${AI_DB_USER:-ai}
      POSTGRES_PASSWORD: ${AI_DB_PASSWORD:-ai}
    ports:
      - "${AI_DB_PORT:-5437}:5432"
    volumes:
      - ai-db-data:/var/lib/postgresql/data
      - ./infra/ai-db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AI_DB_USER:-ai} -d ${AI_DB_NAME:-ai_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================================
  # Message Queue
  # =============================================================

  kafka:
    image: apache/kafka:3.8.0
    container_name: ib-kafka
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_RETENTION_MINUTES: 10080         # 7일. 기본값 1440(1일) — 그룹 정지 후 offset 보존 기간
      KAFKA_REPLICA_SELECTOR_CLASS: org.apache.kafka.common.replica.RackAwareReplicaSelector  # L8 rack awareness
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 결제계 Kafka 토픽 원샷 프로비저닝.
  # 단일 broker(auto-create=false)에 결제계 18개 토픽을 선생성하고 종료한다.
  # init-topics.sh(payment-service/infra)를 마운트해 kafka:29092 대상으로 1회 실행.
  payment-topic-init:
    image: apache/kafka:3.8.0
    container_name: ib-payment-topic-init
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
    volumes:
      - ./services/payment-service/infra/init-topics.sh:/init-topics.sh:ro
    entrypoint: ["/bin/bash", "/init-topics.sh"]
    restart: "no"

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: ib-schema-registry
    ports:
      - "18081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL: BACKWARD  # 구 consumer가 신 메시지 읽기 가능
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/subjects || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================================
  # Cache
  # =============================================================

  redis:
    image: redis:7-alpine
    container_name: ib-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # =============================================================
  # Application Services
  # =============================================================

  customer-service:
    build:
      context: .
      dockerfile: services/customer-service/Dockerfile
    container_name: ib-customer-service
    ports:
      - "${CUSTOMER_APP_PORT:-8081}:8081"
    environment:
      CUSTOMER_APP_PORT: 8081
      CUSTOMER_DB_HOST: customer-db
      CUSTOMER_DB_PORT: 5432
      CUSTOMER_DB_NAME: ${CUSTOMER_DB_NAME:-customer_db}
      CUSTOMER_DB_USER: ${CUSTOMER_DB_USER:-customer}
      CUSTOMER_DB_PASSWORD: ${CUSTOMER_DB_PASSWORD:-customer}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-internet-banking-jwt-secret-key-must-be-at-least-32-chars!!}
      CRYPTO_KEY_BASE64: ${CRYPTO_KEY_BASE64:-aW50ZXJuZXQtYmFuay1kZXYta2V5LTMyYnl0ZXMhISE=}
      LOG_DIR: /logs
    volumes:
      - C:/logs/internet-banking:/logs
    depends_on:
      customer-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 5


  deposit-service:
    build:
      context: .
      dockerfile: services/deposit-service/Dockerfile
    container_name: ib-deposit-service
    ports:
      - "${DEPOSIT_APP_PORT:-8082}:8082"
    environment:
      DEPOSIT_APP_PORT: 8082
      DEPOSIT_DB_HOST: deposit-db
      DEPOSIT_DB_PORT: 5432
      DEPOSIT_DB_NAME: ${DEPOSIT_DB_NAME:-deposit_db}
      DEPOSIT_DB_USER: ${DEPOSIT_DB_USER:-deposit}
      DEPOSIT_DB_PASSWORD: ${DEPOSIT_DB_PASSWORD:-deposit}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      CRYPTO_KEY_BASE64: ${CRYPTO_KEY_BASE64:-aW50ZXJuZXQtYmFuay1kZXYta2V5LTMyYnl0ZXMhISE=}
      SPRING_PROFILES_ACTIVE: docker
      SPRING_FLYWAY_REPAIR_ON_MIGRATE: "true"
      SPRING_FLYWAY_VALIDATE_ON_MIGRATE: "false"
      LOG_DIR: /logs
    volumes:
      - C:/logs/internet-banking:/logs
    depends_on:
      deposit-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/api/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  loan-service:
    build:
      context: .
      dockerfile: services/loan-service/Dockerfile
    container_name: ib-loan-service
    ports:
      - "${LOAN_APP_PORT:-8083}:8083"
    environment:
      LOAN_APP_PORT: 8083
      LOAN_DB_HOST: loan-db
      LOAN_DB_PORT: 5432
      LOAN_DB_NAME: ${LOAN_DB_NAME:-loan_db}
      LOAN_DB_USER: ${LOAN_DB_USER:-loan}
      LOAN_DB_PASSWORD: ${LOAN_DB_PASSWORD:-loan}
      COMMON_DB_HOST: common-db
      COMMON_DB_PORT: 5432
      COMMON_DB_NAME: ${COMMON_DB_NAME:-common_db}
      COMMON_DB_USER: ${COMMON_DB_USER:-common}
      COMMON_DB_PASSWORD: ${COMMON_DB_PASSWORD:-common}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      CRYPTO_KEY_BASE64: ${CRYPTO_KEY_BASE64:-aW50ZXJuZXQtYmFuay1kZXYta2V5LTMyYnl0ZXMhISE=}
      LOG_DIR: /logs
      SPRING_FLYWAY_REPAIR_ON_MIGRATE: "true"
    volumes:
      - C:/logs/internet-banking:/logs
    depends_on:
      loan-db:
        condition: service_healthy
      common-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    container_name: ib-payment-service
    ports:
      - "${PAYMENT_APP_PORT:-8084}:8084"
    environment:
      PAYMENT_APP_PORT: 8084
      PAYMENT_DB_HOST: payment-db
      PAYMENT_DB_PORT: 5432
      PAYMENT_DB_NAME: ${PAYMENT_DB_NAME:-payment_db}
      PAYMENT_DB_USER: ${PAYMENT_DB_USER:-payment}
      PAYMENT_DB_PASSWORD: ${PAYMENT_DB_PASSWORD:-payment}
      KFTC_KAFKA_BOOTSTRAP: kafka:29092
      BOK_KAFKA_BOOTSTRAP: kafka:29092
      INTERNAL_KAFKA_BOOTSTRAP: kafka:29092
      SPRING_KAFKA_LISTENER_MISSING_TOPICS_FATAL: "false"
      LOG_DIR: /logs
      DEPOSIT_ACCOUNT_URL: http://deposit-service:${DEPOSIT_APP_PORT:-8082}
      DEPOSIT_BALANCE_URL: http://deposit-service:${DEPOSIT_APP_PORT:-8082}
    volumes:
      - C:/logs/internet-banking:/logs
    depends_on:
      payment-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      payment-topic-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  payment-service-b:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    container_name: ib-payment-service-b
    ports:
      - "8180:8084"
    environment:
      PAYMENT_APP_PORT: 8084
      BANK_CODE: "B"
      SPRING_PROFILES_ACTIVE: "mock"
      APP_CORS_ENABLED: "true"
      PAYMENT_DB_HOST: payment-db-b
      PAYMENT_DB_PORT: 5432
      PAYMENT_DB_NAME: payment_b
      PAYMENT_DB_USER: payment
      PAYMENT_DB_PASSWORD: payment
      KFTC_KAFKA_BOOTSTRAP: kafka:29092
      BOK_KAFKA_BOOTSTRAP: kafka:29092
      INTERNAL_KAFKA_BOOTSTRAP: kafka:29092
      KFTC_CONSUMER_GROUP: payment-kftc-b
      BOK_CONSUMER_GROUP: payment-bok-b
      INTERNAL_CONSUMER_GROUP: payment-internal-b
      SPRING_KAFKA_LISTENER_MISSING_TOPICS_FATAL: "false"
      LOG_DIR: /logs
      DEPOSIT_ACCOUNT_URL: http://deposit-service:8082
      DEPOSIT_BALANCE_URL: http://deposit-service:8082
    volumes:
      - C:/logs/internet-banking:/logs
    depends_on:
      payment-db-b:
        condition: service_healthy
      kafka:
        condition: service_healthy
      payment-topic-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  master-service:
    build:
      context: .
      dockerfile: services/master-service/Dockerfile
    container_name: ib-master-service
    ports:
      - "${MASTER_APP_PORT:-8085}:8085"
    environment:
      MASTER_APP_PORT: 8085
      MASTER_DB_HOST: master-db
      MASTER_DB_PORT: 5432
      MASTER_DB_NAME: ${MASTER_DB_NAME:-master_db}
      MASTER_DB_USER: ${MASTER_DB_USER:-master}
      MASTER_DB_PASSWORD: ${MASTER_DB_PASSWORD:-master}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CRYPTO_KEY_BASE64: ${CRYPTO_KEY_BASE64:-aW50ZXJuZXQtYmFuay1kZXYta2V5LTMyYnl0ZXMhISE=}
      LOG_DIR: /logs
    volumes:
      - C:/logs/internet-banking:/logs
    depends_on:
      master-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  auto-loan-review:
    build:
      context: .
      dockerfile: services/auto-loan-review/Dockerfile
    container_name: ib-auto-loan-review
    environment:
      AUTO_LOAN_REVIEW_APP_PORT: ${AUTO_LOAN_REVIEW_APP_PORT:-8089}
      AI_DB_HOST: ai-db
      AI_DB_PORT: 5432
      AI_DB_NAME: ${AI_DB_NAME:-ai_db}
      AI_DB_USER: ${AI_DB_USER:-ai}
      AI_DB_PASSWORD: ${AI_DB_PASSWORD:-ai}
      AI_DB_URL: jdbc:postgresql://ai-db:5432/${AI_DB_NAME:-ai_db}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SPRING_PROFILES_ACTIVE: docker
      LOG_DIR: /logs
      AI_LLM_PROVIDER: ${GEMINI_LOAN_PROVIDER:-stub}
      AI_LLM_MODEL: ${GEMINI_LOAN_MODEL:-stub-v1}
      GEMINI_BASE_URL: ${GEMINI_LOAN_BASE_URL:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      LANGFUSE_ENABLED: "true"
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_HOST: http://langfuse:3000
    volumes:
      - C:/logs/internet-banking:/logs
    depends_on:
      ai-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${AUTO_LOAN_REVIEW_APP_PORT:-8089}/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  consultation-service:
    build:
      context: services/consultation-service
      dockerfile: Dockerfile
    container_name: ib-consultation-service
    ports:
      - "${CONSULTATION_APP_PORT:-8087}:8087"
    environment:
      CONSULTATION_DATABASE_URL: postgresql+psycopg://${DEPOSIT_DB_USER:-deposit}:${DEPOSIT_DB_PASSWORD:-deposit}@deposit-db:5432/${DEPOSIT_DB_NAME:-deposit_db}
      CONSULTATION_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      CONSULTATION_KAFKA_ENABLED: "false"
      CONSULTATION_OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CONSULTATION_OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      GOAL_AGENT_ENABLED: ${GOAL_AGENT_ENABLED:-true}
      GOAL_AGENT_URL: ${GOAL_AGENT_URL:-http://host.docker.internal:8000}
      GOAL_AGENT_API_KEY: ${GOAL_AGENT_API_KEY:-}
      MATURITY_AGENT_ENABLED: ${MATURITY_AGENT_ENABLED:-false}
      SPENDING_AGENT_ENABLED: ${SPENDING_AGENT_ENABLED:-false}
      LOG_DIR: /logs
    volumes:
      - C:/logs/internet-banking:/logs
    depends_on:
      deposit-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8087/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mock-responder:
    image: python:3.12-alpine
    container_name: ib-mock-responder
    command: >
      sh -c "pip install --quiet kafka-python-ng==2.2.3 && python /app/responder.py"
    volumes:
      - ./services/payment-service/mock:/app:ro
    environment:
      KFTC_BOOTSTRAP: kafka:29092
      BOK_BOOTSTRAP:  kafka:29092
      SUCCESS_RATE:   "${SUCCESS_RATE:-1.0}"
      DELAY_MS:       "${DELAY_MS:-300}"
    depends_on:
      kafka:
        condition: service_healthy
      payment-topic-init:
        condition: service_completed_successfully
    restart: on-failure
    profiles:
      - mock

  # =============================================================
  # Monitoring — Metrics (Prometheus + Grafana)
  # =============================================================

  prometheus:
    image: prom/prometheus:latest
    container_name: ib-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  grafana:
    image: grafana/grafana:latest
    container_name: ib-grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_METRICS_ENABLED: "true"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  alertmanager:
    image: prom/alertmanager:latest
    container_name: ib-alertmanager
    ports:
      - "${ALERTMANAGER_PORT:-9095}:9093"
    command: --config.file=/etc/alertmanager/alertmanager.yml
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9093/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: ib-blackbox-exporter
    ports:
      - "${BLACKBOX_PORT:-9115}:9115"
    command: --config.file=/etc/blackbox/blackbox.yml
    volumes:
      - ./infra/blackbox/blackbox.yml:/etc/blackbox/blackbox.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9115/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # =============================================================
  # Monitoring — Logging (Loki + Promtail)
  # =============================================================

  loki:
    image: grafana/loki:latest
    container_name: ib-loki
    ports:
      - "${LOKI_PORT:-3100}:3100"
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    healthcheck:
      disable: true
      timeout: 5s
      retries: 3
      start_period: 20s

  promtail:
    image: grafana/promtail:latest
    container_name: ib-promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./infra/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - C:/logs/internet-banking:/logs:ro
    depends_on:
      loki:
        condition: service_started

  # =============================================================
  # Monitoring — LLM Tracing (Langfuse + Phoenix)
  # =============================================================

  langfuse-db:
    image: postgres:16-alpine
    container_name: ib-langfuse-db
    environment:
      POSTGRES_DB: ${LANGFUSE_DB_NAME:-langfuse_db}
      POSTGRES_USER: ${LANGFUSE_DB_USER:-langfuse}
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD:-langfuse}
    ports:
      - "${LANGFUSE_DB_PORT:-5439}:5432"
    volumes:
      - langfuse-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LANGFUSE_DB_USER:-langfuse} -d ${LANGFUSE_DB_NAME:-langfuse_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse:
    image: langfuse/langfuse:2
    container_name: ib-langfuse
    ports:
      - "${LANGFUSE_PORT:-3001}:3000"
    environment:
      DATABASE_URL: postgresql://${LANGFUSE_DB_USER:-langfuse}:${LANGFUSE_DB_PASSWORD:-langfuse}@langfuse-db:5432/${LANGFUSE_DB_NAME:-langfuse_db}
      NEXTAUTH_URL: http://localhost:${LANGFUSE_PORT:-3001}
      NEXTAUTH_SECRET: ${LANGFUSE_SECRET:-langfuse-secret-change-in-prod}
      SALT: ${LANGFUSE_SALT:-langfuse-salt-change-in-prod}
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
    depends_on:
      langfuse-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/public/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: ib-phoenix
    ports:
      - "${PHOENIX_PORT:-6006}:6006"
      - "${PHOENIX_GRPC_PORT:-4317}:4317"
    environment:
      PHOENIX_WORKING_DIR: /phoenix
    volumes:
      - phoenix-data:/phoenix

  # =============================================================
  # Application
  # =============================================================

  gateway-service:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: ib-gateway
    ports:
      - "${GATEWAY_APP_PORT:-8080}:8080"
    environment:
      GATEWAY_APP_PORT: 8080
      LOG_DIR: /logs
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-internet-banking-jwt-secret-key-must-be-at-least-32-chars!!}
      CUSTOMER_SERVICE_HOST: customer-service
      CUSTOMER_SERVICE_PORT: 8081
      DEPOSIT_SERVICE_HOST: deposit-service
      DEPOSIT_SERVICE_PORT: ${DEPOSIT_APP_PORT:-8082}
      LOAN_SERVICE_HOST: loan-service
      LOAN_SERVICE_PORT: ${LOAN_APP_PORT:-8083}
      PAYMENT_SERVICE_HOST: payment-service
      PAYMENT_SERVICE_PORT: ${PAYMENT_APP_PORT:-8084}
      MASTER_SERVICE_HOST: master-service
      MASTER_SERVICE_PORT: ${MASTER_APP_PORT:-8085}
      AI_SERVICE_HOST: auto-loan-review
      AI_SERVICE_PORT: ${AUTO_LOAN_REVIEW_APP_PORT:-8089}
    volumes:
      - C:/logs/internet-banking:/logs
    depends_on:
      customer-service:
        condition: service_healthy
      deposit-service:
        condition: service_healthy
      loan-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      master-service:
        condition: service_healthy
      auto-loan-review:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── doc-agent 전용 (profile: doc) ─────────────────────────────────────────
  doc-agent-db:
    profiles: ["doc"]
    image: postgres:16-alpine
    container_name: ib-doc-agent-db
    environment:
      POSTGRES_DB: ${DOC_AGENT_DB_NAME:-doc_agent_db}
      POSTGRES_USER: ${DOC_AGENT_DB_USER:-docagent}
      POSTGRES_PASSWORD: ${DOC_AGENT_DB_PASSWORD:-docagent}
    ports:
      # 5438은 common-db가 사용 → doc-agent-db는 5440 (start.ps1 DOC_AGENT_DB_PORT와 일치)
      - "${DOC_AGENT_DB_PORT:-5440}:5432"
    volumes:
      - doc-agent-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DOC_AGENT_DB_USER:-docagent} -d ${DOC_AGENT_DB_NAME:-doc_agent_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    profiles: ["doc"]
    image: minio/minio:latest
    container_name: ib-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  vault:
    profiles: ["doc"]
    image: hashicorp/vault:1.15
    container_name: ib-vault
    command: server -dev -dev-root-token-id=root
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "${VAULT_PORT:-8200}:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8200/v1/sys/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── RAG 전용 (profile: rag) ───────────────────────────────────────────────
  kafka-connect:
    profiles: ["rag"]
    build:
      context: ./infra/kafka-connect
      dockerfile: Dockerfile
    container_name: ib-kafka-connect
    ports:
      # 호스트 8083은 loan-service 정규 포트(LOAN_APP_PORT)와 충돌 → Connect는 18083으로 게시
      # (컨테이너 내부 CONNECT_REST_PORT/내부 통신은 8083 그대로)
      - "${KAFKA_CONNECT_PORT:-18083}:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:29092
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: ib-connect-group
      CONNECT_CONFIG_STORAGE_TOPIC: _connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: _connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: _connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/connectors || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-connect-init:
    profiles: ["rag"]
    image: curlimages/curl:8.7.1
    container_name: ib-kafka-connect-init
    depends_on:
      kafka-connect:
        condition: service_healthy
    volumes:
      - ./infra/kafka-connect/connectors:/connectors:ro
      - ./infra/kafka-connect/register-connectors.sh:/register-connectors.sh:ro
    entrypoint: ["/bin/sh", "/register-connectors.sh"]
    restart: on-failure

  elasticsearch:
    profiles: ["rag"]
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: ib-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx2g
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "${ES_PORT:-9200}:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=10s || exit 1"]
      interval: 15s
      timeout: 15s
      retries: 10

  kibana:
    profiles: ["rag"]
    image: docker.elastic.co/kibana/kibana:8.15.0
    container_name: ib-kibana
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  doc-agent:
    profiles: ["doc"]
    build:
      context: .
      dockerfile: services/doc-agent/Dockerfile
    container_name: ib-doc-agent
    ports:
      - "${DOC_AGENT_APP_PORT:-8087}:8087"
    environment:
      DOC_AGENT_APP_PORT: 8087
      DOC_AGENT_DB_HOST: doc-agent-db
      DOC_AGENT_DB_PORT: 5432
      DOC_AGENT_DB_NAME: ${DOC_AGENT_DB_NAME:-doc_agent_db}
      DOC_AGENT_DB_USER: ${DOC_AGENT_DB_USER:-docagent}
      DOC_AGENT_DB_PASSWORD: ${DOC_AGENT_DB_PASSWORD:-docagent}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-minioadmin}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-minioadmin}
      VAULT_ENABLED: "true"
      VAULT_HOST: vault
      VAULT_PORT: 8200
      VAULT_TOKEN: root
      INFERENCE_SERVER_URL: http://inference-server:8090
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      DRIVER_LICENSE_API_KEY: ${DRIVER_LICENSE_API_KEY:-}
      DRIVER_LICENSE_API_ENABLED: ${DRIVER_LICENSE_API_ENABLED:-false}
    depends_on:
      doc-agent-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      vault:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8087/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 5

  review-ai-gateway:
    build:
      context: .
      dockerfile: services/review-ai-gateway/Dockerfile
    container_name: ib-review-ai-gateway
    ports:
      - "${AIGATEWAY_APP_PORT:-8088}:8088"
    environment:
      AIGATEWAY_APP_PORT: 8088
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_PROFILES_ACTIVE: docker
      LOG_DIR: /logs
      LOAN_SERVICE_URL: http://loan-service:8083
      AI_SERVICE_BASE_URL: http://auto-loan-review:8089
      ADVISORY_BASE_URL: http://advisory-service:8080
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-opus-4-7}
      LANGFUSE_ENABLED: "true"
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_HOST: http://langfuse:3000
    volumes:
      - C:/logs/internet-banking:/logs
    depends_on:
      kafka:
        condition: service_healthy
      loan-service:
        condition: service_healthy
      auto-loan-review:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8088/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  kafka-exporter-kftc:
    image: danielqsj/kafka-exporter:latest
    container_name: ib-kafka-exporter-kftc
    command:
      - "--kafka.server=kafka:29092"
    ports:
      - "${KAFKA_EXPORTER_KFTC_PORT:-9308}:9308"
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure

  kafka-exporter-bok:
    image: danielqsj/kafka-exporter:latest
    container_name: ib-kafka-exporter-bok
    command:
      - "--kafka.server=kafka:29092"
    ports:
      - "${KAFKA_EXPORTER_BOK_PORT:-9309}:9308"
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure

  kafka-exporter-internal:
    image: danielqsj/kafka-exporter:latest
    container_name: ib-kafka-exporter-internal
    command:
      - "--kafka.server=kafka:29092"
    ports:
      - "${KAFKA_EXPORTER_INTERNAL_PORT:-9310}:9308"
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure

volumes:
  customer-db-data:
  deposit-db-data:
  loan-db-data:
  common-db-data:
  payment-db-data:
  payment-db-b-data:
  master-db-data:

  ai-db-data:
  redis-data:
  kafka-data:
  prometheus-data:
  grafana-data:
  doc-agent-db-data:
  minio-data:
  elasticsearch-data:
  loki-data:
  langfuse-db-data:
  phoenix-data:
