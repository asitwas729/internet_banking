name: internet-banking

services:
  customer-db:
    image: postgres:16-alpine
    container_name: ib-customer-db
    environment:
      POSTGRES_DB: ${CUSTOMER_DB_NAME:-customer_db}
      POSTGRES_USER: ${CUSTOMER_DB_USER:-customer}
      POSTGRES_PASSWORD: ${CUSTOMER_DB_PASSWORD:-customer}
    ports:
      - "${CUSTOMER_DB_PORT:-5432}:5432"
    volumes:
      - customer-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CUSTOMER_DB_USER:-customer} -d ${CUSTOMER_DB_NAME:-customer_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  deposit-db:
    image: postgres:16-alpine
    container_name: ib-deposit-db
    environment:
      POSTGRES_DB: ${DEPOSIT_DB_NAME:-deposit_db}
      POSTGRES_USER: ${DEPOSIT_DB_USER:-deposit}
      POSTGRES_PASSWORD: ${DEPOSIT_DB_PASSWORD:-deposit}
    ports:
      - "${DEPOSIT_DB_PORT:-5433}:5432"
    volumes:
      - deposit-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DEPOSIT_DB_USER:-deposit} -d ${DEPOSIT_DB_NAME:-deposit_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  loan-db:
    image: postgres:16-alpine
    container_name: ib-loan-db
    environment:
      POSTGRES_DB: ${LOAN_DB_NAME:-loan_db}
      POSTGRES_USER: ${LOAN_DB_USER:-loan}
      POSTGRES_PASSWORD: ${LOAN_DB_PASSWORD:-loan}
    ports:
      - "${LOAN_DB_PORT:-5434}:5432"
    volumes:
      - loan-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LOAN_DB_USER:-loan} -d ${LOAN_DB_NAME:-loan_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  payment-db:
    image: postgres:16-alpine
    container_name: ib-payment-db
    environment:
      POSTGRES_DB: ${PAYMENT_DB_NAME:-payment_db}
      POSTGRES_USER: ${PAYMENT_DB_USER:-payment}
      POSTGRES_PASSWORD: ${PAYMENT_DB_PASSWORD:-payment}
    ports:
      - "${PAYMENT_DB_PORT:-5435}:5432"
    volumes:
      - payment-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PAYMENT_DB_USER:-payment} -d ${PAYMENT_DB_NAME:-payment_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  master-db:
    image: postgres:16-alpine
    container_name: ib-master-db
    environment:
      POSTGRES_DB: ${MASTER_DB_NAME:-master_db}
      POSTGRES_USER: ${MASTER_DB_USER:-master}
      POSTGRES_PASSWORD: ${MASTER_DB_PASSWORD:-master}
    ports:
      - "${MASTER_DB_PORT:-5436}:5432"
    volumes:
      - master-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MASTER_DB_USER:-master} -d ${MASTER_DB_NAME:-master_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-db:
    image: pgvector/pgvector:pg16
    container_name: ib-ai-db
    environment:
      POSTGRES_DB: ${AI_DB_NAME:-ai_db}
      POSTGRES_USER: ${AI_DB_USER:-ai}
      POSTGRES_PASSWORD: ${AI_DB_PASSWORD:-ai}
    ports:
      - "${AI_DB_PORT:-5437}:5432"
    volumes:
      - ai-db-data:/var/lib/postgresql/data
      - ./infra/ai-db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AI_DB_USER:-ai} -d ${AI_DB_NAME:-ai_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.8.0
    container_name: ib-kafka
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_RETENTION_MINUTES: 10080         # 7일. 기본값 1440(1일) — 그룹 정지 후 offset 보존 기간
      KAFKA_REPLICA_SELECTOR_CLASS: org.apache.kafka.common.replica.RackAwareReplicaSelector  # L8 rack awareness
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: ib-schema-registry
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL: BACKWARD  # 구 consumer가 신 메시지 읽기 가능
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/subjects || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ib-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: ib-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: ib-grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

  gateway-service:
    build:
      context: .
      dockerfile: services/gateway-service/Dockerfile
    container_name: ib-gateway
    ports:
      - "${GATEWAY_APP_PORT:-8080}:8080"
    environment:
      GATEWAY_APP_PORT: 8080
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-internet-banking-jwt-secret-key-must-be-at-least-32-chars!!}
      CUSTOMER_SERVICE_HOST: customer-service
      CUSTOMER_APP_PORT: ${CUSTOMER_APP_PORT:-8081}
      DEPOSIT_SERVICE_HOST: deposit-service
      DEPOSIT_APP_PORT: ${DEPOSIT_APP_PORT:-8082}
      LOAN_SERVICE_HOST: loan-service
      LOAN_APP_PORT: ${LOAN_APP_PORT:-8083}
      PAYMENT_SERVICE_HOST: payment-service
      PAYMENT_APP_PORT: ${PAYMENT_APP_PORT:-8084}
      MASTER_SERVICE_HOST: master-service
      MASTER_APP_PORT: ${MASTER_APP_PORT:-8085}
      AI_SERVICE_HOST: ai-service
      AI_APP_PORT: ${AI_APP_PORT:-8086}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  customer-db-data:
  deposit-db-data:
  loan-db-data:
  payment-db-data:
  master-db-data:

  ai-db-data:
  redis-data:
  prometheus-data:
  grafana-data:
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.
